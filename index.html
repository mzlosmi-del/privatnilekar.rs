<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekar — Kalendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Spectral:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:      #0f1623;
  --navy-mid:  #1a2336;
  --navy-lite: #243047;
  --slate:     #8897b0;
  --line:      #2a3547;
  --white:     #f4f6fb;
  --off:       #e8ecf4;
  --ink:       #1a2336;
  --ink-soft:  #4a5568;
  --ink-muted: #94a3b8;
  --teal:      #2dd4bf;
  --teal-dark: #0d9488;
  --teal-dim:  rgba(45,212,191,0.12);
  --amber:     #f59e0b;
  --amber-dim: rgba(245,158,11,0.15);
  --red:       #ef4444;
  --red-dim:   rgba(239,68,68,0.12);
  --green:     #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --r:         10px;
  --r-lg:      16px;
  --shadow:    0 4px 24px rgba(0,0,0,0.25);
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--navy);
  color: var(--white);
  display: flex;
  flex-direction: column;
}

/* ── LOGIN ─────────────────────────────────────── */
#loginScreen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh;
  background: var(--navy);
}
.login-card {
  width: 380px;
  background: var(--navy-mid);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 40px;
  box-shadow: var(--shadow);
}
.login-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px;
}
.login-logo-mark {
  width: 36px; height: 36px;
  background: var(--teal);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.login-logo-mark svg { width: 18px; height: 18px; }
.login-logo-text {
  font-size: 1.1rem; font-weight: 700; color: var(--white); letter-spacing: -0.02em;
}
.login-logo-text span { color: var(--teal); }
.login-title {
  font-family: 'Spectral', serif;
  font-size: 1.5rem; font-weight: 600;
  color: var(--white); margin-bottom: 6px;
}
.login-sub { font-size: 0.82rem; color: var(--slate); margin-bottom: 28px; }
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--slate); margin-bottom: 6px;
}
.field input {
  width: 100%; padding: 10px 14px;
  background: var(--navy-lite); border: 1px solid var(--line);
  border-radius: var(--r); color: var(--white);
  font-family: 'Syne', sans-serif; font-size: 0.88rem;
  outline: none; transition: border-color 0.15s;
}
.field input:focus { border-color: var(--teal); }
.field input::placeholder { color: var(--slate); opacity: 0.6; }
.login-err {
  font-size: 0.8rem; color: var(--red);
  background: var(--red-dim); border-radius: 8px;
  padding: 8px 12px; margin-bottom: 14px; display: none;
}
.btn-login {
  width: 100%; padding: 12px;
  background: var(--teal); color: var(--navy);
  border: none; border-radius: var(--r);
  font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  letter-spacing: -0.01em;
}
.btn-login:hover { background: #5eead4; transform: translateY(-1px); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* ── APP SHELL ─────────────────────────────────── */
#app {
  display: none; flex-direction: column; height: 100vh; overflow: hidden;
}
#app.visible { display: flex; }

/* ── TOP BAR ───────────────────────────────────── */
.topbar {
  height: 56px; flex-shrink: 0;
  background: var(--navy-mid);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; padding: 0 24px; gap: 20px;
  z-index: 10;
}
.topbar-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.95rem; font-weight: 700; letter-spacing: -0.02em;
  color: var(--white); white-space: nowrap; margin-right: 8px;
}
.topbar-logo span { color: var(--teal); }
.topbar-logo-mark {
  width: 28px; height: 28px; background: var(--teal);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
}
.topbar-logo-mark svg { width: 14px; height: 14px; }
.topbar-divider { width: 1px; height: 28px; background: var(--line); }
.tab-nav { display: flex; gap: 2px; }
.tab-btn {
  padding: 6px 16px; border-radius: 8px;
  font-size: 0.82rem; font-weight: 600;
  color: var(--slate); background: transparent; border: none;
  cursor: pointer; transition: all 0.12s; letter-spacing: -0.01em;
}
.tab-btn:hover { color: var(--white); background: var(--navy-lite); }
.tab-btn.active { color: var(--teal); background: var(--teal-dim); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.doctor-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px 5px 6px;
  background: var(--navy-lite); border-radius: 20px;
  font-size: 0.8rem; color: var(--white);
}
.doctor-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--teal); color: var(--navy);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 800;
}
.btn-logout {
  padding: 5px 12px; border-radius: 8px;
  font-size: 0.78rem; font-weight: 600;
  color: var(--slate); background: transparent;
  border: 1px solid var(--line); cursor: pointer; transition: all 0.12s;
  font-family: 'Syne', sans-serif;
}
.btn-logout:hover { color: var(--red); border-color: var(--red); }

/* ── PANELS ────────────────────────────────────── */
.panels { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
.panel.active { display: flex; }

/* ── CALENDAR PANEL ────────────────────────────── */
.cal-toolbar {
  flex-shrink: 0;
  display: flex; align-items: center; gap: 12px;
  padding: 12px 24px;
  background: var(--navy-mid);
  border-bottom: 1px solid var(--line);
}
.cal-nav-btn {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--navy-lite); border: 1px solid var(--line);
  color: var(--white); font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s;
}
.cal-nav-btn:hover { border-color: var(--teal); color: var(--teal); }
.cal-week-label {
  font-size: 0.9rem; font-weight: 700; color: var(--white);
  min-width: 220px; letter-spacing: -0.02em;
}
.cal-today-btn {
  padding: 5px 12px; border-radius: 8px;
  font-size: 0.78rem; font-weight: 600; font-family: 'Syne', sans-serif;
  background: var(--navy-lite); border: 1px solid var(--line);
  color: var(--slate); cursor: pointer; transition: all 0.12s;
}
.cal-today-btn:hover { color: var(--teal); border-color: var(--teal); }
.cal-legend { display: flex; gap: 14px; margin-left: 8px; }
.cal-legend-item { display: flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--slate); }
.cal-legend-dot { width: 8px; height: 8px; border-radius: 3px; }
.cal-add-btn {
  margin-left: auto;
  padding: 6px 16px; border-radius: 8px;
  background: var(--teal); color: var(--navy);
  font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700;
  border: none; cursor: pointer; transition: all 0.12s; letter-spacing: -0.01em;
}
.cal-add-btn:hover { background: #5eead4; }

/* ── CALENDAR GRID ─────────────────────────────── */
.cal-scroll { flex: 1; overflow-y: auto; overflow-x: auto; }
.cal-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.cal-scroll::-webkit-scrollbar-track { background: var(--navy); }
.cal-scroll::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

.cal-grid {
  display: grid;
  grid-template-columns: 52px repeat(7, 1fr);
  min-width: 780px;
}

.cal-head-spacer { background: var(--navy-mid); border-bottom: 2px solid var(--line); }
.cal-day-head {
  background: var(--navy-mid);
  border-bottom: 2px solid var(--line);
  border-left: 1px solid var(--line);
  padding: 10px 8px;
  text-align: center;
}
.cal-day-head .dow {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--slate);
}
.cal-day-head .dom {
  font-size: 1.1rem; font-weight: 800; color: var(--white);
  line-height: 1.2; margin-top: 2px; letter-spacing: -0.03em;
}
.cal-day-head.today .dom {
  color: var(--teal);
}
.cal-day-head.today .dow { color: var(--teal); }

/* Time rows */
.cal-time-cell {
  padding: 0 8px 0 0;
  text-align: right;
  font-size: 0.62rem; font-weight: 600; color: var(--slate);
  border-right: 1px solid var(--line);
  position: relative;
  height: 36px;
  letter-spacing: 0.02em;
}
.cal-time-cell span { position: absolute; top: -8px; right: 8px; white-space: nowrap; }

.cal-slot {
  height: 36px;
  border-left: 1px solid var(--line);
  border-bottom: 1px solid rgba(255,255,255,0.03);
  position: relative;
  cursor: pointer;
  transition: background 0.08s;
}
.cal-slot:hover { background: rgba(45,212,191,0.05); }
.cal-slot.half-hour { border-bottom: 1px solid var(--line); }
.cal-slot.past { opacity: 0.45; cursor: default; }
.cal-slot.past:hover { background: transparent; }

/* Appointment blocks */
.cal-block {
  position: absolute;
  left: 3px; right: 3px; top: 2px;
  border-radius: 6px;
  padding: 3px 7px;
  font-size: 0.7rem; font-weight: 700;
  cursor: pointer; z-index: 2;
  overflow: hidden;
  transition: filter 0.1s, transform 0.1s;
  line-height: 1.3;
  letter-spacing: -0.01em;
}
.cal-block:hover { filter: brightness(1.15); transform: scaleY(1.02); }
.cal-block.confirmed { background: var(--teal-dim); border-left: 3px solid var(--teal); color: var(--teal); }
.cal-block.pending   { background: var(--amber-dim); border-left: 3px solid var(--amber); color: var(--amber); }
.cal-block.cancelled { background: var(--red-dim); border-left: 3px solid var(--red); color: #fca5a5; opacity: 0.6; }
.cal-block.blocker   { background: rgba(148,163,184,0.1); border-left: 3px solid var(--slate); color: var(--slate); }
.cal-block-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-block-svc  { font-weight: 400; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── APPOINTMENTS LIST ─────────────────────────── */
.list-panel-inner {
  flex: 1; overflow-y: auto; padding: 24px;
}
.list-panel-inner::-webkit-scrollbar { width: 6px; }
.list-panel-inner::-webkit-scrollbar-track { background: var(--navy); }
.list-panel-inner::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

.list-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
}
.list-title {
  font-family: 'Spectral', serif;
  font-size: 1.4rem; font-weight: 600; color: var(--white);
  letter-spacing: -0.02em;
}
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-chip {
  padding: 5px 14px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 700; font-family: 'Syne', sans-serif;
  border: 1px solid var(--line); background: transparent;
  color: var(--slate); cursor: pointer; transition: all 0.12s;
  letter-spacing: -0.01em;
}
.filter-chip:hover { color: var(--white); border-color: var(--slate); }
.filter-chip.active { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }

.appt-table { width: 100%; border-collapse: collapse; }
.appt-table th {
  text-align: left; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--slate); padding: 8px 14px;
  border-bottom: 1px solid var(--line);
}
.appt-table td {
  padding: 13px 14px; font-size: 0.85rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
.appt-table tr:hover td { background: rgba(255,255,255,0.02); cursor: pointer; }
.appt-name { font-weight: 700; color: var(--white); }
.appt-svc  { font-size: 0.78rem; color: var(--slate); margin-top: 2px; }
.appt-date { font-size: 0.82rem; color: var(--white); font-weight: 600; }
.appt-time-val { font-size: 0.78rem; color: var(--slate); margin-top: 2px; }
.appt-note { font-size: 0.78rem; color: var(--slate); max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.02em;
}
.badge-confirmed { background: var(--teal-dim);  color: var(--teal); }
.badge-pending   { background: var(--amber-dim); color: var(--amber); }
.badge-cancelled { background: var(--red-dim);   color: #fca5a5; }
.badge-blocker   { background: rgba(148,163,184,0.1); color: var(--slate); }

.empty-state {
  text-align: center; padding: 64px 20px;
  color: var(--slate); font-size: 0.88rem;
}
.empty-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.5; }

/* ── MODAL ─────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(10,15,30,0.75);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.overlay.open { display: flex; }
.modal {
  background: var(--navy-mid);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  width: 100%; max-width: 460px;
  box-shadow: var(--shadow);
  animation: modalIn 0.18s ease;
  overflow: hidden;
}
@keyframes modalIn { from { transform: translateY(12px) scale(0.98); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--line);
}
.modal-head h3 {
  font-family: 'Spectral', serif;
  font-size: 1rem; font-weight: 600; color: var(--white);
}
.modal-close {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--navy-lite); border: none;
  color: var(--slate); font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.12s;
}
.modal-close:hover { background: var(--red-dim); color: var(--red); }
.modal-body { padding: 22px; }
.modal-type-row {
  display: flex; gap: 8px; margin-bottom: 18px;
}
.type-btn {
  flex: 1; padding: 8px; border-radius: 8px;
  font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
  border: 1px solid var(--line); background: transparent;
  color: var(--slate); cursor: pointer; transition: all 0.12s;
  letter-spacing: -0.01em;
}
.type-btn.active { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }
.mfield { margin-bottom: 14px; }
.mfield label {
  display: block; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--slate); margin-bottom: 6px;
}
.mfield input, .mfield select, .mfield textarea {
  width: 100%; padding: 9px 13px;
  background: var(--navy-lite); border: 1px solid var(--line);
  border-radius: var(--r); color: var(--white);
  font-family: 'Syne', sans-serif; font-size: 0.85rem;
  outline: none; transition: border-color 0.15s;
}
.mfield input:focus, .mfield select:focus, .mfield textarea:focus { border-color: var(--teal); }
.mfield input::placeholder, .mfield textarea::placeholder { color: var(--slate); opacity: 0.5; }
.mfield select option { background: var(--navy-mid); }
.mfield textarea { resize: vertical; min-height: 68px; }
.mrow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-err {
  font-size: 0.8rem; color: var(--red);
  background: var(--red-dim); border-radius: 8px;
  padding: 8px 12px; margin-bottom: 12px; display: none;
}
.btn-save {
  width: 100%; padding: 11px;
  background: var(--teal); color: var(--navy);
  border: none; border-radius: var(--r);
  font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700;
  cursor: pointer; transition: all 0.12s; letter-spacing: -0.01em;
}
.btn-save:hover { background: #5eead4; }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

/* Detail modal */
.detail-row {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 11px 0; border-bottom: 1px solid var(--line);
}
.detail-row:last-of-type { border-bottom: none; }
.detail-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; width: 20px; }
.detail-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--slate); margin-bottom: 2px; }
.detail-val { font-size: 0.88rem; color: var(--white); font-weight: 600; }
.detail-actions { display: flex; gap: 8px; margin-top: 18px; }
.btn-edit {
  flex: 1; padding: 9px;
  background: var(--navy-lite); border: 1px solid var(--line);
  border-radius: var(--r); color: var(--white);
  font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; transition: all 0.12s;
}
.btn-edit:hover { border-color: var(--teal); color: var(--teal); }
.btn-delete {
  padding: 9px 16px;
  background: var(--red-dim); border: 1px solid transparent;
  border-radius: var(--r); color: #fca5a5;
  font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; transition: all 0.12s;
}
.btn-delete:hover { background: var(--red); color: white; }

/* Status selector */
.status-row { display: flex; gap: 6px; margin-bottom: 14px; }
.status-opt {
  flex: 1; padding: 7px 4px; border-radius: 8px; text-align: center;
  font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
  border: 1px solid var(--line); background: transparent;
  color: var(--slate); cursor: pointer; transition: all 0.12s;
}
.status-opt[data-val="confirmed"].sel { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }
.status-opt[data-val="pending"].sel   { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
.status-opt[data-val="cancelled"].sel { background: var(--red-dim); border-color: var(--red); color: #fca5a5; }

/* ── SCROLLBAR on list ─────────────────────────── */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg viewBox="0 0 18 18" fill="none"><rect x="8" y="2" width="2" height="14" rx="1" fill="#0f1623"/><rect x="2" y="8" width="14" height="2" rx="1" fill="#0f1623"/></svg>
      </div>
      <div class="login-logo-text">Privatni<span>Lekar</span></div>
    </div>
    <div class="login-title">Dobrodošli</div>
    <div class="login-sub">Prijavite se da pristupite kalendaru</div>
    <div class="field">
      <label>Email</label>
      <input id="lgEmail" type="email" placeholder="vas@email.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="field">
      <label>Lozinka</label>
      <input id="lgPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-err" id="lgErr"></div>
    <button class="btn-login" id="lgBtn" onclick="doLogin()">Prijavite se →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-mark">
        <svg viewBox="0 0 14 14" fill="none"><rect x="6" y="1" width="2" height="12" rx="1" fill="#0f1623"/><rect x="1" y="6" width="12" height="2" rx="1" fill="#0f1623"/></svg>
      </div>
      Privatni<span>Lekar</span>
    </div>
    <div class="topbar-divider"></div>
    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('calendar',this)">Kalendar</button>
      <button class="tab-btn" onclick="switchTab('list',this)">Termini</button>
    </div>
    <div class="topbar-right">
      <div class="doctor-chip">
        <div class="doctor-avatar" id="doctorAvatar"></div>
        <span id="doctorName"></span>
      </div>
      <button class="btn-logout" onclick="doLogout()">Odjava</button>
    </div>

<script>
// ── CONFIG ────────────────────────────────────────────
const SUPA_URL = 'https://vuwjngaeimzeraytfqyp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1d2puZ2FlaW16ZXJheXRmcXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDIxMjcsImV4cCI6MjA4ODQ3ODEyN30.G1iw4_Expb2ey11LTbpQoSj6OecC2NLN5saPFGHfMaM';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const CAL_START = 7;   // 07:00
const CAL_END   = 21;  // 21:00
const SLOT_H    = 36;  // px per 30-min slot
const DAYS = ['Pon','Uto','Sre','Čet','Pet','Sub','Ned'];

// ── STATE ─────────────────────────────────────────────
let doctor       = null;
let calOffset    = 0;
let calAppts     = [];
let calBlocks    = [];
let listFilter   = 'all';
let editingId    = null;
let editingType  = null; // 'appt' | 'block'
let modalType    = 'appt';

// ── UTILS ─────────────────────────────────────────────
const localDate = d => {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
};
const todayLocal = () => localDate(new Date());
const parseTime  = t => { const [h,m] = (t||'00:00').split(':').map(Number); return h*60+m; };
const minsToTime = m => String(Math.floor(m/60)).padStart(2,'0') + ':' + String(m%60).padStart(2,'0');
const fmtDate    = d => new Date(d+'T12:00:00').toLocaleDateString('sr-RS',{weekday:'short',day:'numeric',month:'short'});
const fmtDateLong= d => new Date(d+'T12:00:00').toLocaleDateString('sr-RS',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

function getMondayOf(offset) {
  const now = new Date();
  const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const dow = (today.getDay() + 6) % 7; // Mon=0
  const monday = new Date(today);
  monday.setDate(today.getDate() - dow + offset * 7);
  return monday;
}

function weekDays(offset) {
  const mon = getMondayOf(offset);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(mon);
    d.setDate(mon.getDate() + i);
    return d;
  });
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg; el.style.display = 'block';
}
function clearErr(id) {
  const el = document.getElementById(id);
  if (el) el.style.display = 'none';
}

// ── AUTH ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) await initApp(session.user);
});

async function doLogin() {
  const email = document.getElementById('lgEmail').value.trim();
  const pass  = document.getElementById('lgPass').value;
  if (!email || !pass) return showErr('lgErr','Unesite email i lozinku.');
  const btn = document.getElementById('lgBtn');
  btn.disabled = true; btn.textContent = 'Prijavljujem…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Prijavite se →';
  if (error) return showErr('lgErr', 'Pogrešan email ili lozinka.');
  clearErr('lgErr');
  await initApp(data.user);
}

async function initApp(user) {
  // Find or create doctor row
  let { data: doc } = await sb.from('doctors').select('*').eq('email', user.email).maybeSingle();
  if (!doc) {
    const name = user.user_metadata?.full_name || user.email.split('@')[0];
    const { data: created } = await sb.from('doctors').insert({ email: user.email, full_name: name }).select().single();
    doc = created;
  }
  doctor = doc;

  // Set UI
  document.getElementById('doctorName').textContent = doctor.full_name;
  const initials = doctor.full_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('doctorAvatar').textContent = initials;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  renderCalendar();
}

async function doLogout() {
  await sb.auth.signOut();
  doctor = null;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('lgEmail').value = '';
  document.getElementById('lgPass').value  = '';
}

// ── TABS ──────────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  if (tab === 'calendar') {
    document.getElementById('panelCalendar').classList.add('active');
    renderCalendar();
  } else {
    document.getElementById('panelList').classList.add('active');
    renderList();
  }
}

// ── CALENDAR ──────────────────────────────────────────
function calNav(dir) { calOffset += dir; renderCalendar(); }
function calGoToday() { calOffset = 0; renderCalendar(); }

async function renderCalendar() {
  const days = weekDays(calOffset);
  const from = localDate(days[0]);
  const to   = localDate(days[6]);
  const todayStr = todayLocal();

  // Week label
  document.getElementById('calWeekLabel').textContent =
    days[0].toLocaleDateString('sr-RS',{day:'numeric',month:'long'}) + ' – ' +
    days[6].toLocaleDateString('sr-RS',{day:'numeric',month:'long',year:'numeric'});

  // Fetch data
  const [{ data: appts }, { data: blocks }] = await Promise.all([
    sb.from('appointments').select('*').eq('doctor_id', doctor.id).gte('date', from).lte('date', to),
    sb.from('blockers').select('*').eq('doctor_id', doctor.id).gte('date', from).lte('date', to),
  ]);
  calAppts  = appts  || [];
  calBlocks = blocks || [];

  const grid = document.getElementById('calGrid');
  const slots = (CAL_END - CAL_START) * 2; // 30-min slots
  const now = new Date();
  const nowMins = now.getHours() * 60 + now.getMinutes();

  let html = '';

  // Header row
  html += '<div class="cal-head-spacer"></div>';
  days.forEach((d, i) => {
    const ds = localDate(d);
    const isToday = ds === todayStr;
    html += `<div class="cal-day-head ${isToday ? 'today' : ''}">
      <div class="dow">${DAYS[i]}</div>
      <div class="dom">${d.getDate()}</div>
    </div>`;
  });

  // Time slots
  for (let s = 0; s < slots; s++) {
    const slotMins = (CAL_START * 60) + s * 30;
    const timeStr  = minsToTime(slotMins);
    const isHour   = s % 2 === 0;

    // Time label cell
    html += `<div class="cal-time-cell">${isHour ? `<span>${timeStr}</span>` : ''}</div>`;

    days.forEach((d, di) => {
      const ds      = localDate(d);
      const isToday = ds === todayStr;
      const isPast  = isToday ? slotMins < nowMins : ds < todayStr;

      // Find appt starting this slot
      const appt = calAppts.find(a => a.date === ds && a.time_from === timeStr);
      // Check if inside a blocker
      const blocker = calBlocks.find(b => b.date === ds && parseTime(b.time_from) <= slotMins && parseTime(b.time_to) > slotMins);
      const blockerStarts = calBlocks.find(b => b.date === ds && b.time_from === timeStr);

      let blockHtml = '';

      if (appt) {
        const durSlots = Math.max(1, appt.duration / 30);
        const h = durSlots * SLOT_H - 4;
        blockHtml = `<div class="cal-block ${appt.status}" style="height:${h}px"
          onclick="event.stopPropagation();openDetail('appt','${appt.id}')">
          <div class="cal-block-name">${appt.patient_name}</div>
          ${appt.service ? `<div class="cal-block-svc">${appt.service}</div>` : ''}
        </div>`;
      } else if (blockerStarts) {
        const durMins = parseTime(blocker.time_to) - parseTime(blocker.time_from);
        const durSlots = Math.max(1, durMins / 30);
        const h = durSlots * SLOT_H - 4;
        blockHtml = `<div class="cal-block blocker" style="height:${h}px"
          onclick="event.stopPropagation();openDetail('block','${blockerStarts.id}')">
          <div class="cal-block-name">🚫 ${blockerStarts.label || 'Nedostupno'}</div>
        </div>`;
      }

      html += `<div class="cal-slot ${isHour ? '' : 'half-hour'} ${isPast ? 'past' : ''}"
        onclick="${isPast ? '' : `calSlotClick('${ds}','${timeStr}')`}">${blockHtml}</div>`;
    });
  }

  grid.innerHTML = html;

  // Scroll to 08:00
  const scrollTarget = (CAL_START === 7 ? 2 : 0) * SLOT_H;
  requestAnimationFrame(() => {
    const scroller = document.querySelector('.cal-scroll');
    if (scroller) scroller.scrollTop = 2 * SLOT_H; // 1 hour in = 08:00
  });
}

function calSlotClick(date, time) {
  openNewModal(date, time);
}

// ── APPOINTMENTS LIST ──────────────────────────────────
async function renderList() {
  const tbody = document.getElementById('apptTableBody');
  const empty = document.getElementById('listEmpty');
  tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:32px;color:var(--slate)">Učitavamo…</td></tr>';

  let q = sb.from('appointments').select('*').eq('doctor_id', doctor.id).order('date').order('time_from');
  if (listFilter !== 'all') q = q.eq('status', listFilter);

  const { data: appts } = await q;
  if (!appts?.length) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = appts.map(a => `
    <tr onclick="openDetail('appt','${a.id}')">
      <td><div class="appt-name">${a.patient_name}</div>${a.service ? `<div class="appt-svc">${a.service}</div>` : ''}</td>
      <td><div class="appt-date">${fmtDate(a.date)}</div></td>
      <td><div class="appt-date">${a.time_from}</div><div class="appt-time-val">${a.duration} min</div></td>
      <td><div class="appt-note">${a.note || '—'}</div></td>
      <td>${badgeHtml(a.status)}</td>
    </tr>`).join('');
}

function setFilter(f, btn) {
  listFilter = f;
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function badgeHtml(status) {
  const map = { confirmed:'Potvrđen', pending:'Na čekanju', cancelled:'Otkazan' };
  return `<span class="badge badge-${status}">${map[status]||status}</span>`;
}

// ── MODALS ─────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  clearErr('editErr');
}
document.addEventListener('click', e => {
  if (e.target.classList.contains('overlay')) closeModal(e.target.id);
});

// ── NEW / EDIT MODAL ───────────────────────────────────
function setType(t) {
  modalType = t;
  document.getElementById('typeAppt').classList.toggle('active', t === 'appt');
  document.getElementById('typeBlock').classList.toggle('active', t === 'block');
  document.getElementById('apptFields').style.display = t === 'appt' ? 'block' : 'none';
  document.getElementById('blockFields').style.display = t === 'block' ? 'block' : 'none';
}

function openNewModal(date, time) {
  editingId   = null;
  editingType = null;
  document.getElementById('editModalTitle').textContent = 'Novi termin';
  setType('appt');

  const d = date || todayLocal();
  const t = time || '09:00';
  document.getElementById('fPatient').value  = '';
  document.getElementById('fService').value  = '';
  document.getElementById('fDate').value     = d;
  document.getElementById('fTime').value     = t;
  document.getElementById('fDuration').value = '30';
  document.getElementById('fStatus').value   = 'confirmed';
  document.getElementById('fNote').value     = '';
  document.getElementById('bDate').value     = d;
  document.getElementById('bFrom').value     = t;
  document.getElementById('bDuration').value = '60';
  document.getElementById('bLabel').value    = '';
  document.getElementById('saveBtn').textContent = 'Sačuvaj →';
  clearErr('editErr');
  openModal('editModal');
}

function openEditModal(type, entry) {
  editingId   = entry.id;
  editingType = type;
  document.getElementById('editModalTitle').textContent = 'Izmeni ' + (type === 'appt' ? 'termin' : 'blokadu');
  setType(type);

  if (type === 'appt') {
    document.getElementById('fPatient').value  = entry.patient_name || '';
    document.getElementById('fService').value  = entry.service || '';
    document.getElementById('fDate').value     = entry.date || '';
    document.getElementById('fTime').value     = entry.time_from || '';
    document.getElementById('fDuration').value = entry.duration || 30;
    document.getElementById('fStatus').value   = entry.status || 'confirmed';
    document.getElementById('fNote').value     = entry.note || '';
  } else {
    document.getElementById('bLabel').value    = entry.label || '';
    document.getElementById('bDate').value     = entry.date || '';
    document.getElementById('bFrom').value     = entry.time_from || '';
    const dur = parseTime(entry.time_to) - parseTime(entry.time_from);
    document.getElementById('bDuration').value = dur || 60;
  }
  document.getElementById('saveBtn').textContent = 'Sačuvaj izmene →';
  clearErr('editErr');
  closeModal('detailModal');
  openModal('editModal');
}

async function saveEntry() {
  clearErr('editErr');
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Čuvam…';

  let error;

  if (modalType === 'appt') {
    const patient  = document.getElementById('fPatient').value.trim();
    const service  = document.getElementById('fService').value.trim();
    const date     = document.getElementById('fDate').value;
    const time     = document.getElementById('fTime').value;
    const duration = parseInt(document.getElementById('fDuration').value) || 30;
    const status   = document.getElementById('fStatus').value;
    const note     = document.getElementById('fNote').value.trim();

    if (!patient) { btn.disabled=false; btn.textContent='Sačuvaj →'; return showErr('editErr','Unesite ime pacijenta.'); }
    if (!date)    { btn.disabled=false; btn.textContent='Sačuvaj →'; return showErr('editErr','Odaberite datum.'); }
    if (!time)    { btn.disabled=false; btn.textContent='Sačuvaj →'; return showErr('editErr','Odaberite vreme.'); }

    const payload = { doctor_id: doctor.id, patient_name: patient, service, date, time_from: time, duration, status, note };

    if (editingId) {
      ({ error } = await sb.from('appointments').update(payload).eq('id', editingId));
    } else {
      ({ error } = await sb.from('appointments').insert(payload));
    }

  } else {
    const label    = document.getElementById('bLabel').value.trim() || 'Nedostupno';
    const date     = document.getElementById('bDate').value;
    const timeFrom = document.getElementById('bFrom').value;
    const dur      = parseInt(document.getElementById('bDuration').value) || 60;

    if (!date)     { btn.disabled=false; btn.textContent='Sačuvaj →'; return showErr('editErr','Odaberite datum.'); }
    if (!timeFrom) { btn.disabled=false; btn.textContent='Sačuvaj →'; return showErr('editErr','Odaberite vreme.'); }

    const timeTo = minsToTime(parseTime(timeFrom) + dur);
    const payload = { doctor_id: doctor.id, label, date, time_from: timeFrom, time_to: timeTo };

    if (editingId) {
      ({ error } = await sb.from('blockers').update(payload).eq('id', editingId));
    } else {
      ({ error } = await sb.from('blockers').insert(payload));
    }
  }

  btn.disabled = false; btn.textContent = editingId ? 'Sačuvaj izmene →' : 'Sačuvaj →';

  if (error) return showErr('editErr', error.message);

  closeModal('editModal');
  editingId = editingType = null;
  renderCalendar();
  if (document.getElementById('panelList').classList.contains('active')) renderList();
}

// ── DETAIL MODAL ───────────────────────────────────────
async function openDetail(type, id) {
  let entry;
  if (type === 'appt') {
    const { data } = await sb.from('appointments').select('*').eq('id', id).single();
    entry = data;
  } else {
    const { data } = await sb.from('blockers').select('*').eq('id', id).single();
    entry = data;
  }
  if (!entry) return;

  const isAppt = type === 'appt';
  document.getElementById('detailTitle').textContent = isAppt ? 'Detalji termina' : 'Detalji blokade';

  let html = '';
  if (isAppt) {
    html += detailRow('👤', 'Pacijent',  entry.patient_name);
    html += detailRow('🩺', 'Usluga',    entry.service || '—');
    html += detailRow('📅', 'Datum',     fmtDateLong(entry.date));
    html += detailRow('🕐', 'Vreme',     entry.time_from + ' · ' + entry.duration + ' min');
    html += detailRow('📊', 'Status',    badgeHtml(entry.status));
    if (entry.note) html += detailRow('📝', 'Napomena', entry.note);
  } else {
    html += detailRow('🚫', 'Blokada', entry.label || 'Nedostupno');
    html += detailRow('📅', 'Datum',   fmtDateLong(entry.date));
    html += detailRow('🕐', 'Vreme',   entry.time_from + ' – ' + entry.time_to);
  }

  html += `<div class="detail-actions">
    <button class="btn-edit" onclick="openEditModal('${type}', ${JSON.stringify(entry).replace(/"/g,'&quot;')})">✏️ Izmeni</button>
    <button class="btn-delete" onclick="deleteEntry('${type}','${entry.id}')">🗑 Briši</button>
  </div>`;

  document.getElementById('detailBody').innerHTML = html;
  openModal('detailModal');
}

function detailRow(icon, label, val) {
  return `<div class="detail-row">
    <div class="detail-icon">${icon}</div>
    <div><div class="detail-label">${label}</div><div class="detail-val">${val}</div></div>
  </div>`;
}

async function deleteEntry(type, id) {
  if (!confirm('Obrisati ovaj unos?')) return;
  const table = type === 'appt' ? 'appointments' : 'blockers';
  await sb.from(table).delete().eq('id', id);
  closeModal('detailModal');
  renderCalendar();
  if (document.getElementById('panelList').classList.contains('active')) renderList();
}
</script>
