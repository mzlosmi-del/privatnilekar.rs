<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lekar — Kalendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Spectral:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:      #f0f6ff;
  --navy-mid:  #ffffff;
  --navy-lite: #e8f0fc;
  --slate:     #6b7fa3;
  --line:      #dae4f5;
  --white:     #1a2a4a;
  --off:       #f5f8ff;
  --ink:       #1a2a4a;
  --ink-soft:  #3d4f72;
  --ink-muted: #8a9abf;
  --blue:      #2563eb;
  --blue-mid:  #3b82f6;
  --blue-dim:  rgba(37,99,235,0.10);
  --teal:      #2563eb;
  --teal-dark: #1d4ed8;
  --teal-dim:  rgba(37,99,235,0.10);
  --amber:     #d97706;
  --amber-dim: rgba(217,119,6,0.12);
  --red:       #dc2626;
  --red-dim:   rgba(220,38,38,0.10);
  --green:     #16a34a;
  --green-dim: rgba(22,163,74,0.10);
  --r:         10px;
  --r-lg:      16px;
  --shadow:    0 2px 16px rgba(37,99,235,0.08), 0 1px 4px rgba(0,0,0,0.06);
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Syne', sans-serif;
  background: var(--navy);
  color: var(--ink);
  display: flex;
  flex-direction: column;
}

/* ── LOGIN ─────────────────────────────────────── */
#loginScreen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh;
  background: linear-gradient(135deg, #e8f0fc 0%, #f0f6ff 60%, #dbeafe 100%);
}
.login-card {
  width: 380px;
  background: var(--navy-mid);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 40px;
  box-shadow: var(--shadow);
}
.login-logo {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 32px;
}
.login-logo-mark {
  width: 36px; height: 36px;
  background: var(--blue);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.login-logo-mark svg { width: 18px; height: 18px; }
.login-logo-text {
  font-size: 1.1rem; font-weight: 700; color: var(--ink); letter-spacing: -0.02em;
}
.login-logo-text span { color: var(--blue); }
.login-title {
  font-family: 'Spectral', serif;
  font-size: 1.5rem; font-weight: 600;
  color: var(--ink); margin-bottom: 6px;
}
.login-sub { font-size: 0.82rem; color: var(--slate); margin-bottom: 28px; }
.field { margin-bottom: 14px; }
.field label {
  display: block; font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--slate); margin-bottom: 6px;
}
.field input {
  width: 100%; padding: 10px 14px;
  background: var(--navy-lite); border: 1px solid var(--line);
  border-radius: var(--r); color: var(--ink);
  font-family: 'Syne', sans-serif; font-size: 0.88rem;
  outline: none; transition: border-color 0.15s;
}
.field input:focus { border-color: var(--blue); }
.field input::placeholder { color: var(--slate); opacity: 0.6; }
.login-err {
  font-size: 0.8rem; color: var(--red);
  background: var(--red-dim); border-radius: 8px;
  padding: 8px 12px; margin-bottom: 14px; display: none;
}
.btn-login {
  width: 100%; padding: 12px;
  background: var(--blue); color: #ffffff;
  border: none; border-radius: var(--r);
  font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s;
  letter-spacing: -0.01em;
}
.btn-login:hover { background: var(--blue-mid); transform: translateY(-1px); }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.login-card { width: 400px; max-width: 96vw; }
.auth-switch {
  text-align: center; margin-top: 20px;
  font-size: 0.82rem; color: var(--slate);
}
.auth-switch a {
  color: var(--blue); font-weight: 700; cursor: pointer;
  text-decoration: none;
}
.auth-switch a:hover { text-decoration: underline; }
.auth-screen { display: none; }
.auth-screen.active { display: block; }
.auth-divider {
  border: none; border-top: 1px solid var(--line);
  margin: 20px 0;
}
.auth-success {
  font-size: 0.85rem; color: #15803d;
  background: #f0fdf4; border: 1px solid #86efac;
  border-radius: 8px; padding: 10px 14px;
  margin-bottom: 14px; display: none;
}
.btn-login-secondary {
  width: 100%; padding: 11px;
  background: transparent; color: var(--blue);
  border: 2px solid var(--blue); border-radius: var(--r);
  font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700;
  cursor: pointer; transition: all 0.15s; margin-top: 8px;
}
.btn-login-secondary:hover { background: var(--blue-dim); }
.login-err.success {
  color: #15803d; background: #f0fdf4; border: 1px solid #86efac;
}
/* ── APP SHELL ─────────────────────────────────── */
#app {
  display: none; flex-direction: column; height: 100vh; overflow: hidden;
}
#app.visible { display: flex; }

/* ── TOP BAR ───────────────────────────────────── */
.topbar {
  height: 56px; flex-shrink: 0;
  background: var(--navy-mid);
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; padding: 0 24px; gap: 20px;
  z-index: 10;
}
.topbar-logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 0.95rem; font-weight: 700; letter-spacing: -0.02em;
  color: var(--ink); white-space: nowrap; margin-right: 8px;
}
.topbar-logo span { color: var(--blue); }
.topbar-logo-mark {
  width: 28px; height: 28px; background: var(--blue);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
}
.topbar-logo-mark svg { width: 14px; height: 14px; }
.topbar-divider { width: 1px; height: 28px; background: var(--line); }
.tab-nav { display: flex; gap: 2px; }
.tab-btn {
  padding: 6px 16px; border-radius: 8px;
  font-size: 0.82rem; font-weight: 600;
  color: var(--slate); background: transparent; border: none;
  cursor: pointer; transition: all 0.12s; letter-spacing: -0.01em;
}
.tab-btn:hover { color: var(--ink); background: var(--navy-lite); }
.tab-btn.active { color: var(--blue); background: var(--blue-dim); }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.doctor-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px 5px 6px;
  background: var(--navy-lite); border-radius: 20px;
  font-size: 0.8rem; color: var(--ink);
}
.doctor-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  background: var(--blue); color: #ffffff;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 800;
}
.btn-logout {
  padding: 5px 12px; border-radius: 8px;
  font-size: 0.78rem; font-weight: 600;
  color: var(--slate); background: transparent;
  border: 1px solid var(--line); cursor: pointer; transition: all 0.12s;
  font-family: 'Syne', sans-serif;
}
.btn-logout:hover { color: var(--red); border-color: var(--red); }

/* ── PANELS ────────────────────────────────────── */
.panels { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.panel { display: none; flex: 1; overflow: hidden; flex-direction: column; }
#panelPatients { overflow-y: auto !important; overflow-x: hidden !important; }
.panel.active { display: flex; }

/* ── CALENDAR PANEL ────────────────────────────── */
.cal-toolbar {
  flex-shrink: 0;
  display: flex; flex-direction: column;
  padding: 0;
  background: #ffffff;
  border-bottom: 1px solid var(--line);
  box-shadow: 0 1px 4px rgba(37,99,235,0.06);
}
.cal-toolbar-row1 {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px;
}
.cal-toolbar-row2 {
  display: none;
  align-items: center; gap: 8px;
  padding: 6px 20px 8px;
  border-top: 1px solid var(--line);
  background: var(--off);
}
.cal-toolbar-row2.visible { display: flex; }
.cal-nav-group { display: flex; gap: 3px; }
.cal-nav-btn {
  width: 30px; height: 30px; border-radius: 7px;
  background: var(--off); border: 1px solid var(--line);
  color: var(--ink-soft); font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.12s; font-weight: 600;
}
.cal-nav-btn:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-dim); }
.cal-today-btn {
  padding: 5px 11px; border-radius: 7px;
  font-size: 0.75rem; font-weight: 700; font-family: 'Syne', sans-serif;
  background: var(--off); border: 1px solid var(--line);
  color: var(--slate); cursor: pointer; transition: all 0.12s;
  white-space: nowrap;
}
.cal-today-btn:hover { color: var(--blue); border-color: var(--blue); background: var(--blue-dim); }
.cal-week-label {
  font-size: 0.88rem; font-weight: 700; color: var(--ink);
  letter-spacing: -0.02em; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.cal-toolbar-right {
  display: flex; align-items: center; gap: 10px; margin-left: auto; flex-shrink: 0;
}
.cal-add-btn {
  padding: 7px 16px; border-radius: 8px;
  background: var(--blue); color: #ffffff;
  font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
  border: none; cursor: pointer; transition: all 0.12s; letter-spacing: -0.01em;
  white-space: nowrap;
}
.cal-add-btn:hover { background: var(--blue-mid); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(37,99,235,0.25); }

/* ── CALENDAR GRID ─────────────────────────────── */
.cal-header-row {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: 52px repeat(7, 1fr);
  background: var(--off);
  border-bottom: 2px solid var(--line);
  box-shadow: 0 2px 8px rgba(37,99,235,0.07);
  overflow: hidden;
}
.cal-scroll { flex: 1; overflow-y: auto; overflow-x: auto; }
.cal-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.cal-scroll::-webkit-scrollbar-track { background: var(--off); }
.cal-scroll::-webkit-scrollbar-thumb { background: #c5d4ee; border-radius: 3px; }

.cal-grid {
  display: grid;
  grid-template-columns: 52px repeat(7, 1fr);
}

.cal-head-spacer { background: var(--off); }
.cal-day-head {
  background: var(--off);
  border-left: 1px solid var(--line);
  padding: 10px 8px;
  text-align: center;
}
.cal-day-head .dow {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--slate);
}
.cal-day-head .dom {
  font-size: 1.1rem; font-weight: 800; color: var(--ink);
  line-height: 1.2; margin-top: 2px; letter-spacing: -0.03em;
}
.cal-day-head.today .dom { color: var(--blue); }
.cal-day-head.today .dow { color: var(--blue); }

.cal-time-cell {
  padding: 0 8px 0 0;
  text-align: right;
  font-size: 0.62rem; font-weight: 600; color: var(--ink-muted);
  border-right: 1px solid var(--line);
  position: sticky; left: 0; z-index: 3;
  background: #ffffff;
  height: 36px;
  letter-spacing: 0.02em;
  box-shadow: 2px 0 6px rgba(37,99,235,0.05);
}
.cal-time-cell span { position: absolute; top: -8px; right: 8px; white-space: nowrap; }

.cal-slot {
  height: 36px;
  border-left: 1px solid var(--line);
  border-bottom: 1px solid rgba(255,255,255,0.03);
  position: relative; cursor: pointer;
  transition: background 0.08s;
}
.cal-slot:hover { background: rgba(37,99,235,0.04); }
.cal-slot.half-hour { border-bottom: 1px solid var(--line); }
.cal-slot.past { opacity: 0.45; cursor: default; }
.cal-slot.past:hover { background: transparent; }

.cal-block {
  position: absolute;
  top: 2px; border-radius: 6px;
  padding: 3px 7px;
  font-size: 0.7rem; font-weight: 700;
  cursor: pointer; z-index: 2; overflow: hidden;
  transition: filter 0.1s, transform 0.1s;
  line-height: 1.3; letter-spacing: -0.01em;
}
.cal-block:hover { filter: brightness(1.15); transform: scaleY(1.02); }
.cal-block.confirmed { background: rgba(37,99,235,0.10); border-left: 3px solid var(--blue); color: var(--blue); }
.cal-block.pending   { background: rgba(217,119,6,0.12); border-left: 3px solid var(--amber); color: #92400e; }
.cal-block.cancelled { background: rgba(220,38,38,0.08); border-left: 3px solid var(--red); color: var(--red); opacity: 0.6; }
.cal-block.blocker   { background: rgba(107,127,163,0.08); border-left: 3px solid var(--slate); color: var(--slate); }
.cal-block-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cal-block-svc  { font-weight: 400; opacity: 0.8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── APPOINTMENTS LIST ─────────────────────────── */
.list-panel-inner {
  flex: 1; overflow-y: auto; padding: 24px;
}
.list-panel-inner::-webkit-scrollbar { width: 6px; }
.list-panel-inner::-webkit-scrollbar-track { background: var(--navy); }
.list-panel-inner::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

.list-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
}
.list-title {
  font-family: 'Spectral', serif;
  font-size: 1.4rem; font-weight: 600; color: var(--ink);
  letter-spacing: -0.02em;
}
.filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
.filter-chip {
  padding: 5px 14px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 700; font-family: 'Syne', sans-serif;
  border: 1px solid var(--line); background: transparent;
  color: var(--slate); cursor: pointer; transition: all 0.12s;
  letter-spacing: -0.01em;
}
.filter-chip:hover { color: var(--ink); border-color: var(--slate); }
.filter-chip.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }

.appt-table { width: 100%; border-collapse: collapse; }
.appt-table th {
  text-align: left; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--slate); padding: 8px 14px;
  border-bottom: 2px solid var(--line);
  background: var(--off);
}
.appt-table td {
  padding: 13px 14px; font-size: 0.85rem;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
.appt-table tr:hover td { background: var(--blue-dim); cursor: pointer; }
.appt-name { font-weight: 700; color: var(--ink); }
.appt-svc  { font-size: 0.78rem; color: var(--slate); margin-top: 2px; }
.appt-date { font-size: 0.82rem; color: var(--ink); font-weight: 600; }
.appt-time-val { font-size: 0.78rem; color: var(--slate); margin-top: 2px; }
.appt-note { font-size: 0.78rem; color: var(--slate); max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.badge {
  display: inline-flex; align-items: center;
  padding: 3px 10px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.02em;
}
.badge-confirmed { background: var(--blue-dim);  color: var(--blue); }
.badge-pending   { background: var(--amber-dim); color: var(--amber); }
.badge-cancelled { background: var(--red-dim);   color: #fca5a5; }
.badge-blocker   { background: rgba(148,163,184,0.1); color: var(--slate); }

.empty-state {
  text-align: center; padding: 64px 20px;
  color: var(--slate); font-size: 0.88rem;
}
.empty-icon { font-size: 2rem; margin-bottom: 10px; opacity: 0.5; }

/* ── MODAL ─────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(30,58,120,0.25);
  backdrop-filter: blur(6px);
  z-index: 100;
  display: none; align-items: center; justify-content: center;
  padding: 20px;
}
.overlay.open { display: flex; }
.modal {
  background: #ffffff;
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  width: 100%; max-width: 460px;
  box-shadow: 0 8px 40px rgba(37,99,235,0.12), 0 2px 8px rgba(0,0,0,0.08);
  animation: modalIn 0.18s ease;
  overflow: hidden;
}
@keyframes modalIn { from { transform: translateY(12px) scale(0.98); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 22px;
  border-bottom: 1px solid var(--line);
}
.modal-head h3 {
  font-family: 'Spectral', serif;
  font-size: 1rem; font-weight: 600; color: var(--ink);
}
.modal-close {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--navy-lite); border: none;
  color: var(--slate); font-size: 0.9rem;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.12s;
}
.modal-close:hover { background: var(--red-dim); color: var(--red); }
.modal-body { padding: 22px; }
.modal-type-row { display: flex; gap: 8px; margin-bottom: 18px; }
.type-btn {
  flex: 1; padding: 8px; border-radius: 8px;
  font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
  border: 1px solid var(--line); background: transparent;
  color: var(--slate); cursor: pointer; transition: all 0.12s;
  letter-spacing: -0.01em;
}
.type-btn.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); }
.mfield { margin-bottom: 14px; }
.mfield label {
  display: block; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--slate); margin-bottom: 6px;
}
.mfield input, .mfield select, .mfield textarea {
  width: 100%; padding: 9px 13px;
  background: var(--navy-lite); border: 1px solid var(--line);
  border-radius: var(--r); color: var(--ink);
  font-family: 'Syne', sans-serif; font-size: 0.85rem;
  outline: none; transition: border-color 0.15s;
}
.mfield input:focus, .mfield select:focus, .mfield textarea:focus { border-color: var(--blue); }
.mfield input::placeholder, .mfield textarea::placeholder { color: var(--slate); opacity: 0.6; }
.mfield select option { background: #ffffff; color: var(--ink); }
.mfield textarea { resize: vertical; min-height: 68px; }
.mrow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-err {
  font-size: 0.8rem; color: var(--red);
  background: var(--red-dim); border-radius: 8px;
  padding: 8px 12px; margin-bottom: 12px; display: none;
}
.btn-save {
  width: 100%; padding: 11px;
  background: var(--blue); color: #ffffff;
  border: none; border-radius: var(--r);
  font-family: 'Syne', sans-serif; font-size: 0.88rem; font-weight: 700;
  cursor: pointer; transition: all 0.12s; letter-spacing: -0.01em;
}
.btn-save:hover { background: var(--blue-mid); }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

.detail-row {
  display: flex; gap: 12px; align-items: flex-start;
  padding: 11px 0; border-bottom: 1px solid var(--line);
}
.detail-row:last-of-type { border-bottom: none; }
.detail-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; width: 20px; }
.detail-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--slate); margin-bottom: 2px; }
.detail-val { font-size: 0.88rem; color: var(--ink); font-weight: 600; }
.detail-actions { display: flex; gap: 8px; margin-top: 18px; }
.btn-edit {
  flex: 1; padding: 9px;
  background: var(--navy-lite); border: 1px solid var(--line);
  border-radius: var(--r); color: var(--ink);
  font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; transition: all 0.12s;
}
.btn-edit:hover { border-color: var(--blue); color: var(--blue); }
.btn-delete {
  padding: 9px 16px;
  background: var(--red-dim); border: 1px solid transparent;
  border-radius: var(--r); color: #fca5a5;
  font-family: 'Syne', sans-serif; font-size: 0.82rem; font-weight: 700;
  cursor: pointer; transition: all 0.12s;
}
.btn-delete:hover { background: var(--red); color: white; }

.status-row { display: flex; gap: 6px; margin-bottom: 14px; }
.status-opt {
  flex: 1; padding: 7px 4px; border-radius: 8px; text-align: center;
  font-family: 'Syne', sans-serif; font-size: 0.72rem; font-weight: 700;
  border: 1px solid var(--line); background: transparent;
  color: var(--slate); cursor: pointer; transition: all 0.12s;
}
.status-opt[data-val="confirmed"].sel { background: var(--teal-dim); border-color: var(--teal); color: var(--teal); }
.status-opt[data-val="pending"].sel   { background: var(--amber-dim); border-color: var(--amber); color: var(--amber); }
.status-opt[data-val="cancelled"].sel { background: var(--red-dim); border-color: var(--red); color: #fca5a5; }

/* ── VIEW-AS PICKER ───────────────────────────── */
.view-as-label {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--slate); white-space: nowrap;
}
.view-as-pills { display: flex; gap: 4px; flex-wrap: wrap; }
.view-as-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 700; font-family: 'Syne', sans-serif;
  border: 1px solid var(--line); background: transparent;
  color: var(--slate); cursor: pointer; transition: all 0.12s;
}
.view-as-pill:hover { border-color: var(--slate); color: var(--ink); }
.view-as-pill.active { border-color: #7c3aed; background: rgba(124,58,237,0.08); color: #7c3aed; }
.view-as-pill .pill-dot { width: 7px; height: 7px; border-radius: 50%; background: #7c3aed; }

.cal-block.ghost {
  background: rgba(124,58,237,0.07);
  border-left: 3px solid #7c3aed;
  color: #7c3aed; opacity: 0.8; cursor: default;
}
.cal-block.ghost:hover { filter: none; transform: none; }
.ghost-label { font-size: 0.62rem; opacity: 0.7; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

@media (max-width: 600px) {
  .overlay { align-items: flex-end; padding: 0; }
  .modal { border-radius: var(--r-lg) var(--r-lg) 0 0; max-width: 100%; max-height: 92vh; overflow-y: auto; }
  .login-card { width: 100%; max-width: 100%; border-radius: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  .cal-toolbar-row1 { padding: 8px 12px; gap: 6px; flex-wrap: wrap; }
  .cal-toolbar-right { gap: 6px; }
  .cal-week-label { font-size: 0.8rem; order: 3; width: 100%; flex: none; margin-top: -2px; }
  .cal-add-btn { font-size: 0.75rem; padding: 6px 12px; }
  .view-sel-btn { padding: 4px 8px; font-size: 0.7rem; }
  .cal-toolbar-row2 { padding: 6px 12px 8px; gap: 6px; }
  .list-panel-inner { padding: 12px; }
  .appt-table thead { display: none; }
  .appt-table, .appt-table tbody, .appt-table tr, .appt-table td { display: block; }
  .appt-table tr { background: #ffffff; border: 1px solid var(--line); border-radius: var(--r); margin-bottom: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .appt-table tr:hover td { background: transparent; }
  .appt-table td { padding: 0; border: none; font-size: 0.82rem; }
  .appt-table td:empty { display: none; }
  .appt-note { max-width: 100%; white-space: normal; }
  .appt-card-row { display: flex; align-items: center; justify-content: space-between; }
}

@media (min-width: 601px) and (max-width: 900px) {
  .cal-legend { display: none; }
  .cal-toolbar { flex-wrap: wrap; gap: 8px; }
}

@media (max-width: 600px) {
  #svcTable thead { display: none; }
  #svcTable, #svcTable tbody, #svcTable tr, #svcTable td { display: block; }
  #svcTable tr { background: #ffffff; border: 1px solid var(--line); border-radius: var(--r); margin-bottom: 8px; padding: 12px 14px; }
  #svcTable td { padding: 2px 0; border: none; font-size: 0.82rem; }
  #svcTable td:last-child { margin-top: 8px; }
  .appt-status-cell { display: none !important; }
  .appt-note-cell { display: none !important; }
  .appt-table td:nth-child(2) { color: var(--slate); font-size: 0.78rem; }
}
@media (min-width: 601px) {
  .appt-card-row .badge { display: none; }
}

.view-sel {
  display: flex; gap: 0;
  background: var(--off); border: 1px solid var(--line);
  border-radius: 8px; padding: 2px; flex-shrink: 0;
}
.view-sel-btn {
  padding: 4px 12px; border-radius: 6px; border: none; background: transparent;
  font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
  color: var(--slate); cursor: pointer; transition: all 0.12s; white-space: nowrap;
  letter-spacing: -0.01em;
}
.view-sel-btn:hover { color: var(--ink); background: rgba(37,99,235,0.05); }
.view-sel-btn.active { background: #ffffff; color: var(--blue); box-shadow: 0 1px 4px rgba(37,99,235,0.15); }

.bottom-nav { display: none; }
@media (max-width: 600px) {
  .bottom-nav {
    display: flex; flex-shrink: 0;
    background: #ffffff; border-top: 1px solid var(--line);
    box-shadow: 0 -2px 12px rgba(37,99,235,0.07);
    z-index: 10; order: 99;
  }
  .bottom-nav-btn {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 3px; padding: 8px 4px 10px;
    background: none; border: none; cursor: pointer;
    color: var(--slate); font-family: 'Syne', sans-serif;
    font-size: 0.65rem; font-weight: 700; letter-spacing: -0.01em;
    transition: color 0.12s;
  }
  .bottom-nav-btn svg { width: 22px; height: 22px; }
  .bottom-nav-btn.active { color: var(--blue); }
  .bottom-nav-btn.active svg { stroke: var(--blue); }
  .topbar .tab-nav { display: none; }
  .topbar-divider { display: none; }
  .topbar { padding: 0 16px; gap: 12px; height: 52px; }
  .topbar-logo { margin-right: 0; }
  .topbar-logo-text { display: block !important; font-size: 0.88rem; }
  .topbar-right { gap: 10px; }
  .doctor-chip { padding: 4px 10px 4px 5px; }
  .doctor-chip span { display: block !important; font-size: 0.75rem; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .btn-logout { padding: 5px 10px; font-size: 0.75rem; }
  .panels { padding-bottom: 0; }
}

.pt-search-wrap { margin-bottom: 16px; }
.pt-search {

}
.pt-search:focus { border-color: var(--blue); }

.pt-info-strip {

.pt-info-item { display: flex; flex-direction: column; gap: 2px; }

.pt-info-value { font-size: 0.88rem; font-weight: 600; color: var(--ink); }
