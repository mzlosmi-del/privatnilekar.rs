<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrivatniLekar — Edukacija pacijenata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Spectral:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue:      #2563eb;
  --blue-mid:  #3b82f6;
  --blue-dim:  rgba(37,99,235,0.10);
  --ink:       #0f172a;
  --ink-soft:  #334155;
  --slate:     #64748b;
  --line:      #e2e8f0;
  --off:       #f8fafc;
  --white:     #ffffff;
  --green:     #16a34a;
  --amber:     #d97706;
  --red:       #dc2626;
  --r:         10px;
  --r-lg:      16px;
}

html, body {
  height: 100%; font-family: 'Syne', sans-serif;
  background: #0f1117; color: var(--white);
  overflow: hidden;
}

/* ── LAYOUT ──────────────────────────────────────────── */
.app {
  display: grid;
  grid-template-rows: 56px 1fr;
  grid-template-columns: 1fr 340px;
  height: 100vh;
}

/* ── TOPBAR ──────────────────────────────────────────── */
.topbar {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 16px;
  padding: 0 24px;
  background: rgba(15,17,23,0.95);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  z-index: 10;
}
.topbar-logo {
  display: flex; align-items: center; gap: 9px;
  font-size: 1rem; font-weight: 700; color: #fff;
  text-decoration: none;
}
.topbar-logo-mark {
  width: 28px; height: 28px; background: var(--blue);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
}
.topbar-logo-mark svg { width: 14px; height: 14px; }
.topbar-logo span { color: var(--blue-mid); }
.topbar-title {
  font-size: 0.78rem; font-weight: 600; color: rgba(255,255,255,0.45);
  padding-left: 16px; border-left: 1px solid rgba(255,255,255,0.12);
  letter-spacing: 0.04em;
}
.topbar-back {
  margin-left: auto;
  padding: 6px 14px; border-radius: 8px;
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.7); font-family: 'Syne', sans-serif;
  font-size: 0.78rem; font-weight: 600; cursor: pointer;
  text-decoration: none; transition: all 0.12s;
  display: inline-flex; align-items: center; gap: 6px;
}
.topbar-back:hover { background: rgba(255,255,255,0.15); color: #fff; }

/* ── 3D CANVAS AREA ──────────────────────────────────── */
.canvas-area {
  position: relative;
  background: radial-gradient(ellipse at 40% 40%, #1a1f35 0%, #0a0c14 100%);
  overflow: hidden;
}
#threeCanvas {
  width: 100%; height: 100%;
  display: block; cursor: grab;
}
#threeCanvas:active { cursor: grabbing; }

.canvas-hint {
  position: absolute; bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.5); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 6px 16px;
  font-size: 0.72rem; color: rgba(255,255,255,0.5);
  pointer-events: none; white-space: nowrap;
}

.canvas-label {
  position: absolute; top: 20px; left: 20px;
  font-family: 'Spectral', serif;
  font-size: 0.82rem; font-weight: 400; font-style: italic;
  color: rgba(255,255,255,0.3);
}

/* ── SIDEBAR ─────────────────────────────────────────── */
.sidebar {
  background: #13161f;
  border-left: 1px solid rgba(255,255,255,0.07);
  display: flex; flex-direction: column;
  overflow: hidden;
}

.sidebar-section {
  padding: 20px 20px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.sidebar-label {
  font-size: 0.62rem; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(255,255,255,0.3);
  margin-bottom: 12px;
}

/* Condition pills */
.condition-list { display: flex; flex-direction: column; gap: 6px; padding-bottom: 16px; }
.condition-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: var(--r);
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  cursor: pointer; transition: all 0.15s;
  text-align: left;
}
.condition-btn:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.18); }
.condition-btn.active {
  background: var(--blue-dim); border-color: var(--blue);
}
.condition-dot {
  width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
}
.condition-name {
  font-size: 0.85rem; font-weight: 600; color: rgba(255,255,255,0.85);
  line-height: 1.2;
}
.condition-name-sr { font-size: 0.72rem; color: rgba(255,255,255,0.4); margin-top: 1px; }

/* Info panel */
.info-panel { flex: 1; overflow-y: auto; padding: 20px; }
.info-panel::-webkit-scrollbar { width: 4px; }
.info-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.info-title {
  font-family: 'Spectral', serif;
  font-size: 1.3rem; font-weight: 600; color: #fff;
  margin-bottom: 6px; line-height: 1.3;
}
.info-subtitle {
  font-size: 0.78rem; color: rgba(255,255,255,0.4);
  margin-bottom: 18px; font-style: italic;
}
.info-desc {
  font-size: 0.85rem; color: rgba(255,255,255,0.65);
  line-height: 1.75; margin-bottom: 20px;
}

.info-facts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.info-fact {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 12px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.07);
}
.info-fact-icon { font-size: 0.95rem; flex-shrink: 0; margin-top: 1px; }
.info-fact-text { font-size: 0.8rem; color: rgba(255,255,255,0.6); line-height: 1.5; }
.info-fact-text strong { color: rgba(255,255,255,0.9); font-weight: 700; }

.info-steps { display: flex; flex-direction: column; gap: 8px; }
.info-step {
  display: flex; align-items: flex-start; gap: 10px;
}
.info-step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--blue); color: #fff;
  font-size: 0.65rem; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-top: 1px;
}
.info-step-text { font-size: 0.8rem; color: rgba(255,255,255,0.6); line-height: 1.6; }

.info-section-label {
  font-size: 0.62rem; font-weight: 800; letter-spacing: 0.1em;
  text-transform: uppercase; color: rgba(255,255,255,0.25);
  margin-bottom: 10px; margin-top: 18px;
}

/* ── MOBILE ──────────────────────────────────────────── */
@media (max-width: 700px) {
  .app {
    grid-template-rows: 48px 1fr auto;
    grid-template-columns: 1fr;
  }
  .canvas-area { min-height: 55vh; }
  .sidebar { max-height: 45vh; }
  .sidebar-section { padding: 12px 14px 0; }
  .condition-list { flex-direction: row; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 12px; gap: 8px; }
  .condition-btn { flex-direction: column; align-items: flex-start; min-width: 110px; padding: 9px 10px; }
  .info-panel { padding: 14px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <header class="topbar">
    <a class="topbar-logo" href="/app">
      <div class="topbar-logo-mark">
        <svg viewBox="0 0 14 14" fill="none"><rect x="6" y="1" width="2" height="12" rx="1" fill="#fff"/><rect x="1" y="6" width="12" height="2" rx="1" fill="#fff"/></svg>
      </div>
      Privatni<span>Lekar</span>
    </a>
    <span class="topbar-title">Edukacija pacijenata</span>
    <a class="topbar-back" href="/app">← Nazad u aplikaciju</a>
  </header>

  <!-- 3D CANVAS -->
  <div class="canvas-area">
    <canvas id="threeCanvas"></canvas>
    <div class="canvas-label" id="canvasLabel">Zdrav zub</div>
    <div class="canvas-hint">Prevucite za rotaciju · Skrolujte za zum</div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Odaberite stanje</div>
      <div class="condition-list" id="conditionList"></div>
    </div>
    <div class="info-panel" id="infoPanel"></div>
  </aside>

</div>

<script>
// ── CONDITIONS DATA ──────────────────────────────────────────
const CONDITIONS = [
  {
    id: 'healthy',
    name: 'Zdrav zub',
    nameEn: 'Healthy tooth',
    dot: '#86efac',
    desc: 'Zdrav zub ima netaknutu gleđ, ružičastu desnicu koja čvrsto prijanja uz zub, i nema znakova karijesne lezije ili parodontalnog oboljenja.',
    facts: [
      { icon: '✓', text: '<strong>Gleđ</strong> — najtvrđa supstanca u telu, debljine 2–3mm na kvržicama' },
      { icon: '✓', text: '<strong>Dentin</strong> — ispod gleđi, žućkaste boje, mekši i osetljiv na temperaturu' },
      { icon: '✓', text: '<strong>Pulpa</strong> — centralni deo zuba sa nervima i krvnim sudovima' },
    ],
    steps: [],
    threeSetup: (scene, tooth) => {
      tooth.material = new THREE.MeshPhongMaterial({
        color: 0xf5f0e8, specular: 0xffffff,
        shininess: 120, transparent: true, opacity: 1,
      });
    }
  },
  {
    id: 'caries',
    name: 'Karijes',
    nameEn: 'Dental caries',
    dot: '#fef08a',
    desc: 'Karijes je infektivna bolest koja nastaje kada bakterije u ustima razgrađuju šećere i stvaraju kiseline koje razaraju gleđ i dentin.',
    facts: [
      { icon: '⚠️', text: '<strong>Uzrok</strong> — bakterije Streptococcus mutans, šećerna ishrana, loša higijena' },
      { icon: '📍', text: '<strong>Lokacija</strong> — najčešće na fisurnim površinama molara i aproksimalnim površinama' },
      { icon: '🎨', text: '<strong>Izgled</strong> — tamne ili žute mrlje, kavernost u uznapredovaloj fazi' },
    ],
    steps: [
      'Karijes počinje kao bela mrlja — demineralizacija gleđi',
      'Napreduje u tamnu leziju i zahvata dentin',
      'U uznapredovalom stadijumu dostiže pulpu i izaziva bol',
    ],
    threeSetup: (scene, tooth, helpers) => {
      tooth.material = new THREE.MeshPhongMaterial({
        color: 0xd4b483, specular: 0x886644, shininess: 40,
      });
      // Dark caries spot on occlusal
      const geo = new THREE.SphereGeometry(0.38, 16, 16);
      const mat = new THREE.MeshPhongMaterial({ color: 0x4a3520, shininess: 10 });
      const spot = new THREE.Mesh(geo, mat);
      spot.position.set(0.1, 1.05, 0.1);
      spot.scale.set(1, 0.35, 0.8);
      helpers.push(spot);
      scene.add(spot);
      const spot2 = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 12, 12),
        new THREE.MeshPhongMaterial({ color: 0x2d1a08, shininess: 5 })
      );
      spot2.position.set(-0.15, 1.08, -0.1);
      spot2.scale.set(1, 0.3, 0.7);
      helpers.push(spot2);
      scene.add(spot2);
    }
  },
  {
    id: 'filling',
    name: 'Plomba',
    nameEn: 'Composite filling',
    dot: '#86efac',
    desc: 'Kompozitna plomba je restauracija koja zamenjuje karijesom zahvaćeno tkivo zuba. Boje se tako da se vizuelno uklapa sa prirodnim zubom.',
    facts: [
      { icon: '🔬', text: '<strong>Materijal</strong> — kompozitna smola, staklojonomer cement ili keramika' },
      { icon: '⏱️', text: '<strong>Trajanje</strong> — kompozit traje 7–10 godina uz pravilnu higijenu' },
      { icon: '✨', text: '<strong>Estetika</strong> — boja se bira prema prirodnoj boji zuba (Vita skala)' },
    ],
    steps: [
      'Uklanjanje karijesnog tkiva turpijom i hemikasom',
      'Nagrizanje gleđi kiselinom i postavljanje bonda',
      'Nanošenje kompozita u slojevima, polimerizacija svetlom',
      'Modelacija i poliranje do sjaja',
    ],
    threeSetup: (scene, tooth, helpers) => {
      tooth.material = new THREE.MeshPhongMaterial({
        color: 0xf0ebe0, specular: 0xffffff, shininess: 110,
      });
      // Filling — slightly different color on occlusal
      const geoFill = new THREE.BoxGeometry(0.7, 0.15, 0.65);
      const matFill = new THREE.MeshPhongMaterial({
        color: 0xe8e0d0, specular: 0xffffff, shininess: 150,
      });
      const fill = new THREE.Mesh(geoFill, matFill);
      fill.position.set(0, 1.02, 0);
      helpers.push(fill);
      scene.add(fill);
    }
  },
  {
    id: 'crown',
    name: 'Kruna',
    nameEn: 'Dental crown',
    dot: '#93c5fd',
    desc: 'Kruna je protetska nadoknada koja u celosti prekriva klinički deo zuba. Koristi se kada je zub toliko oštećen da ga plomba ne može adekvatno restaurisati.',
    facts: [
      { icon: '🔩', text: '<strong>Indikacije</strong> — masivna destrukcija zuba, zubi posle endodoncije, frakture' },
      { icon: '💎', text: '<strong>Materijali</strong> — cirkonijum (belo, estetski), metalokeramika, e.max litijum disilikat' },
      { icon: '⏳', text: '<strong>Trajanje</strong> — cirkon krune traju 15–25 godina pri pravilnom održavanju' },
    ],
    steps: [
      'Brušenje zuba — redukcija 1.5–2mm cirkumferencijalno',
      'Uzimanje otiska (digitalni skener ili silikonski otisak)',
      'Laboratorijska izrada krune (CAD/CAM ili ručno)',
      'Cementiranje krune na brušeni zub',
    ],
    threeSetup: (scene, tooth, helpers) => {
      // Crown — glazed ceramic look
      tooth.material = new THREE.MeshPhongMaterial({
        color: 0xddeeff, specular: 0xffffff, shininess: 200,
        transparent: true, opacity: 0.92,
      });
      // Metal margin at cervical
      const marginGeo = new THREE.TorusGeometry(0.88, 0.06, 8, 32);
      const marginMat = new THREE.MeshPhongMaterial({ color: 0xb0b8c0, shininess: 200 });
      const margin = new THREE.Mesh(marginGeo, marginMat);
      margin.position.set(0, -0.15, 0);
      margin.rotation.x = Math.PI / 2;
      helpers.push(margin);
      scene.add(margin);
    }
  },
  {
    id: 'implant',
    name: 'Implant',
    nameEn: 'Dental implant',
    dot: '#c4b5fd',
    desc: 'Dentalni implant je titanska fikstura koja se hirurški postavlja u kost vilice i služi kao veštački koren zuba. Na njega se naknadno cementira kruna.',
    facts: [
      { icon: '🔩', text: '<strong>Materijal</strong> — titanijum grade 4 ili titan-cirkonijum legura (hipoalergenski)' },
      { icon: '🦴', text: '<strong>Oseointegracija</strong> — implant se sjedinjuje sa kostju za 3–6 meseci' },
      { icon: '♾️', text: '<strong>Trajnost</strong> — implanti traju doživotno uz pravilnu higijenu i kontrole' },
    ],
    steps: [
      'Hirurško postavljanje implanta u kost vilice',
      'Period zarastanja — oseointegracija (3–6 meseci)',
      'Postavljanje abatmenta (nadgradnje) na implant',
      'Izrada i cementiranje protetske krune',
    ],
    threeSetup: (scene, tooth, helpers) => {
      // Crown on implant
      tooth.material = new THREE.MeshPhongMaterial({
        color: 0xeeeeff, specular: 0xffffff, shininess: 180,
      });
      // Abutment
      const abutGeo = new THREE.CylinderGeometry(0.3, 0.42, 0.7, 16);
      const abutMat = new THREE.MeshPhongMaterial({ color: 0xd4d8e0, shininess: 200 });
      const abut = new THREE.Mesh(abutGeo, abutMat);
      abut.position.set(0, -0.8, 0);
      helpers.push(abut);
      scene.add(abut);
      // Implant screw
      const screwGeo = new THREE.CylinderGeometry(0.28, 0.22, 1.8, 12);
      const screwMat = new THREE.MeshPhongMaterial({ color: 0xa0a8b8, shininess: 160 });
      const screw = new THREE.Mesh(screwGeo, screwMat);
      screw.position.set(0, -1.85, 0);
      helpers.push(screw);
      scene.add(screw);
      // Thread rings
      for (let i = 0; i < 7; i++) {
        const threadGeo = new THREE.TorusGeometry(0.28, 0.04, 6, 16);
        const thread = new THREE.Mesh(threadGeo, screwMat);
        thread.rotation.x = Math.PI / 2;
        thread.position.set(0, -1.1 - i * 0.22, 0);
        helpers.push(thread);
        scene.add(thread);
      }
      // Bone simulation
      const boneGeo = new THREE.CylinderGeometry(0.85, 0.85, 1.9, 20);
      const boneMat = new THREE.MeshPhongMaterial({
        color: 0xf5e6c8, transparent: true, opacity: 0.35, shininess: 20,
      });
      const bone = new THREE.Mesh(boneGeo, boneMat);
      bone.position.set(0, -1.85, 0);
      helpers.push(bone);
      scene.add(bone);
    }
  },
  {
    id: 'endo',
    name: 'Endodoncija',
    nameEn: 'Root canal treatment',
    dot: '#f9a8d4',
    desc: 'Endodontski tretman podrazumeva uklanjanje inficirane ili nekrotične pulpe iz sistema kanala korena i punjenje kanala biokompatibilnim materijalom.',
    facts: [
      { icon: '🦠', text: '<strong>Uzrok</strong> — duboki karijes, trauma, pukotina zuba koja dopre do pulpe' },
      { icon: '💉', text: '<strong>Anestezija</strong> — tretman je bezbolan uz lokalnu anesteziju' },
      { icon: '📊', text: '<strong>Uspešnost</strong> — 85–95% tretmana uspešno nakon 10 godina' },
    ],
    steps: [
      'Pristup pulpi kroz okluzalnu površinu (trepanacija)',
      'Određivanje dužine kanala (elektrometrija + RTG)',
      'Mehanička i hemijska obrada kanala (NaOCl ispiranje)',
      'Punjenje kanala gutaperkom i silerom',
      'Restauracija zuba krunom (preporučeno)',
    ],
    threeSetup: (scene, tooth, helpers) => {
      tooth.material = new THREE.MeshPhongMaterial({
        color: 0xf0e8d8, specular: 0x886644, shininess: 60,
        transparent: true, opacity: 0.82,
      });
      // Canal visualization — pink lines through roots
      const canalMat = new THREE.MeshPhongMaterial({ color: 0xf472b6, shininess: 80 });
      [[-0.3, 0.1], [0.3, 0.1], [0, -0.15]].forEach(([x, z]) => {
        const cGeo = new THREE.CylinderGeometry(0.07, 0.04, 1.6, 8);
        const canal = new THREE.Mesh(cGeo, canalMat);
        canal.position.set(x, -1.3, z);
        helpers.push(canal);
        scene.add(canal);
      });
      // Access cavity
      const accGeo = new THREE.CylinderGeometry(0.22, 0.28, 0.35, 12);
      const accMat = new THREE.MeshPhongMaterial({ color: 0xd4a0b0, shininess: 40 });
      const acc = new THREE.Mesh(accGeo, accMat);
      acc.position.set(0, 0.88, 0);
      helpers.push(acc);
      scene.add(acc);
    }
  },
];

// ── THREE.JS SETUP ───────────────────────────────────────────
const canvas = document.getElementById('threeCanvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = null;

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 50);
camera.position.set(0, 1.5, 6);
camera.lookAt(0, 0, 0);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
keyLight.position.set(3, 5, 4);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 1024;
keyLight.shadow.mapSize.height = 1024;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8bb5e8, 0.5);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0xe8f4ff, 0.4);
rimLight.position.set(0, -3, -4);
scene.add(rimLight);

// ── MOLAR GEOMETRY ───────────────────────────────────────────
function buildMolar() {
  const group = new THREE.Group();

  // Crown — using LatheGeometry for organic shape
  const crownPoints = [
    new THREE.Vector2(0.0,  -0.1),
    new THREE.Vector2(0.92, -0.0),
    new THREE.Vector2(1.02,  0.3),
    new THREE.Vector2(0.98,  0.7),
    new THREE.Vector2(0.88,  1.0),
    new THREE.Vector2(0.72,  1.15),
    new THREE.Vector2(0.5,   1.18),
    new THREE.Vector2(0.0,   1.2),
  ];
  const crownGeo = new THREE.LatheGeometry(crownPoints, 32);
  // Scale to molar proportions (wider than tall)
  crownGeo.scale(1.0, 1.0, 0.82);

  const crownMat = new THREE.MeshPhongMaterial({
    color: 0xf5f0e8,
    specular: 0xffffff,
    shininess: 120,
  });
  const crown = new THREE.Mesh(crownGeo, crownMat);
  crown.castShadow = true;
  crown.receiveShadow = true;
  group.add(crown);

  // Cusps — 4 bumps on occlusal
  const cuspMat = new THREE.MeshPhongMaterial({
    color: 0xf0ebe0, specular: 0xffffff, shininess: 130,
  });
  const cuspPositions = [
    [-0.38, 1.18, -0.28],
    [ 0.38, 1.18, -0.28],
    [-0.38, 1.18,  0.28],
    [ 0.38, 1.18,  0.28],
  ];
  cuspPositions.forEach(([x, y, z]) => {
    const cuspGeo = new THREE.SphereGeometry(0.28, 16, 12);
    const cusp = new THREE.Mesh(cuspGeo, cuspMat);
    cusp.position.set(x, y, z);
    cusp.scale.set(1, 0.62, 0.85);
    cusp.castShadow = true;
    group.add(cusp);
  });

  // Roots — 3 roots for upper molar
  const rootMat = new THREE.MeshPhongMaterial({
    color: 0xede0cc, specular: 0x666644, shininess: 40,
  });
  const rootDefs = [
    { pos: [-0.3,  0.0,  0.1], h: 1.8, rx: 0.25, rz: 0.18, angle: 0.15 },
    { pos: [ 0.3,  0.0,  0.1], h: 1.7, rx: 0.24, rz: 0.18, angle: -0.12 },
    { pos: [ 0.0,  0.0, -0.22], h: 1.9, rx: 0.22, rz: 0.2,  angle: 0.05 },
  ];
  rootDefs.forEach(({ pos, h, rx, rz, angle }) => {
    const rPts = [
      new THREE.Vector2(0.0, 0),
      new THREE.Vector2(rx, 0.1),
      new THREE.Vector2(rx * 0.95, h * 0.4),
      new THREE.Vector2(rx * 0.75, h * 0.7),
      new THREE.Vector2(rx * 0.4,  h * 0.9),
      new THREE.Vector2(0.05,      h),
    ];
    const rGeo = new THREE.LatheGeometry(rPts, 16);
    rGeo.scale(1, 1, rz / rx);
    const root = new THREE.Mesh(rGeo, rootMat);
    root.position.set(pos[0], pos[1] - 0.05, pos[2]);
    root.rotation.z = angle;
    root.rotation.y = Math.atan2(pos[2], pos[0]) * 0.3;
    root.castShadow = true;
    group.add(root);
  });

  // Cervical line groove
  const cervGeo = new THREE.TorusGeometry(0.93, 0.04, 6, 32);
  const cervMat = new THREE.MeshPhongMaterial({ color: 0xd4ccc0, shininess: 60 });
  const cerv = new THREE.Mesh(cervGeo, cervMat);
  cerv.rotation.x = Math.PI / 2;
  cerv.position.y = 0.02;
  group.add(cerv);

  group.position.y = 0.5;
  return group;
}

let toothGroup = buildMolar();
let toothCrown = toothGroup.children[0]; // main crown mesh
let helperObjects = [];
scene.add(toothGroup);

// Subtle platform
const platGeo = new THREE.CylinderGeometry(1.8, 1.8, 0.06, 32);
const platMat = new THREE.MeshPhongMaterial({ color: 0x1a1f2e, shininess: 40 });
const platform = new THREE.Mesh(platGeo, platMat);
platform.position.y = -0.3;
scene.add(platform);

// ── ORBIT CONTROLS (manual) ──────────────────────────────────
let isDragging = false, prevMouse = { x: 0, y: 0 };
let rotY = 0.3, rotX = -0.2, zoom = 6;

canvas.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mouseup',   () => { isDragging = false; });
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x, dy = e.clientY - prevMouse.y;
  rotY += dx * 0.008; rotX += dy * 0.008;
  rotX = Math.max(-1, Math.min(1, rotX));
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('wheel', e => {
  zoom += e.deltaY * 0.01;
  zoom = Math.max(3, Math.min(10, zoom));
  e.preventDefault();
}, { passive: false });

// Touch support
let lastTouch = null;
canvas.addEventListener('touchstart', e => { lastTouch = e.touches[0]; });
canvas.addEventListener('touchmove', e => {
  if (!lastTouch || e.touches.length !== 1) return;
  const t = e.touches[0];
  rotY += (t.clientX - lastTouch.clientX) * 0.010;
  rotX += (t.clientY - lastTouch.clientY) * 0.010;
  rotX = Math.max(-1, Math.min(1, rotX));
  lastTouch = t;
  e.preventDefault();
}, { passive: false });

// ── CONDITION SWITCHING ───────────────────────────────────────
function clearHelpers() {
  helperObjects.forEach(obj => {
    scene.remove(obj);
    obj.geometry?.dispose();
    obj.material?.dispose();
  });
  helperObjects = [];
}

function applyCondition(cond) {
  clearHelpers();
  // Reset crown
  toothCrown.material = new THREE.MeshPhongMaterial({
    color: 0xf5f0e8, specular: 0xffffff, shininess: 120,
  });
  cond.threeSetup(scene, toothCrown, helperObjects);
  document.getElementById('canvasLabel').textContent = cond.name;
  renderInfo(cond);
}

function renderInfo(cond) {
  const panel = document.getElementById('infoPanel');
  let html = `
    <div class="info-title">${cond.name}</div>
    <div class="info-subtitle">${cond.nameEn}</div>
    <div class="info-desc">${cond.desc}</div>`;

  if (cond.facts.length) {
    html += `<div class="info-section-label">Ključne informacije</div>
    <div class="info-facts">`;
    cond.facts.forEach(f => {
      html += `<div class="info-fact">
        <div class="info-fact-icon">${f.icon}</div>
        <div class="info-fact-text">${f.text}</div>
      </div>`;
    });
    html += `</div>`;
  }

  if (cond.steps.length) {
    html += `<div class="info-section-label">Tok tretmana</div>
    <div class="info-steps">`;
    cond.steps.forEach((s, i) => {
      html += `<div class="info-step">
        <div class="info-step-num">${i + 1}</div>
        <div class="info-step-text">${s}</div>
      </div>`;
    });
    html += `</div>`;
  }

  panel.innerHTML = html;
}

// Build condition list
function buildConditionList() {
  const list = document.getElementById('conditionList');
  CONDITIONS.forEach((cond, i) => {
    const btn = document.createElement('button');
    btn.className = 'condition-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = `
      <div class="condition-dot" style="background:${cond.dot}"></div>
      <div>
        <div class="condition-name">${cond.name}</div>
        <div class="condition-name-sr">${cond.nameEn}</div>
      </div>`;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.condition-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyCondition(cond);
    });
    list.appendChild(btn);
  });
}

// ── RESIZE ───────────────────────────────────────────────────
function resizeRenderer() {
  const area = canvas.parentElement;
  const w = area.clientWidth, h = area.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resizeRenderer);
resizeRenderer();

// ── ANIMATION LOOP ───────────────────────────────────────────
let autoRotate = true;
canvas.addEventListener('mousedown', () => { autoRotate = false; });
canvas.addEventListener('touchstart', () => { autoRotate = false; });

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (autoRotate) rotY += 0.005;

  toothGroup.rotation.y = rotY;
  toothGroup.rotation.x = rotX;
  camera.position.set(
    Math.sin(0) * zoom,
    1.5,
    Math.cos(0) * zoom
  );
  camera.position.z = zoom;

  // Gentle float
  toothGroup.position.y = 0.5 + Math.sin(t * 0.8) * 0.05;

  renderer.render(scene, camera);
}

// ── INIT ─────────────────────────────────────────────────────
buildConditionList();
applyCondition(CONDITIONS[0]);
animate();
</script>
</body>
</html>
