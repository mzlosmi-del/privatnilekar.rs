<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrivatniLekar — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Spectral:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy:      #f0f6ff;
  --navy-mid:  #ffffff;
  --navy-lite: #e8f0fc;
  --slate:     #6b7fa3;
  --line:      #dae4f5;
  --off:       #f5f8ff;
  --ink:       #1a2a4a;
  --ink-soft:  #3d4f72;
  --ink-muted: #8a9abf;
  --blue:      #2563eb;
  --blue-mid:  #3b82f6;
  --blue-dim:  rgba(37,99,235,0.10);
  --amber:     #d97706;
  --amber-dim: rgba(217,119,6,0.12);
  --red:       #dc2626;
  --red-dim:   rgba(220,38,38,0.10);
  --green:     #16a34a;
  --green-dim: rgba(22,163,74,0.10);
  --r:         10px;
  --r-lg:      16px;
  --shadow:    0 2px 16px rgba(37,99,235,0.08), 0 1px 4px rgba(0,0,0,0.06);
}

html, body { height: 100%; overflow: hidden; font-family: 'Syne', sans-serif; background: var(--navy); color: var(--ink); }

/* ── LOGIN ─────────────────────────────────────── */
#loginScreen {
  display: flex; align-items: center; justify-content: center;
  height: 100vh;
  background: linear-gradient(135deg, #e8f0fc 0%, #f0f6ff 60%, #dbeafe 100%);
}
.login-card {
  width: 380px; max-width: 96vw;
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 40px;
  box-shadow: var(--shadow);
}
.login-logo {
  display: flex; align-items: center; gap: 10px; margin-bottom: 28px;
}
.login-logo-mark {
  width: 36px; height: 36px; background: var(--red);
  border-radius: 10px; display: flex; align-items: center; justify-content: center;
}
.login-logo-mark svg { width: 18px; height: 18px; }
.login-logo-text { font-size: 1.1rem; font-weight: 700; color: var(--ink); }
.login-logo-text span { color: var(--red); }
.login-badge {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  background: var(--red-dim); color: var(--red);
  font-size: 0.68rem; font-weight: 800; letter-spacing: 0.08em;
  text-transform: uppercase; margin-left: 6px;
}
.login-title { font-family: 'Spectral', serif; font-size: 1.4rem; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.login-sub { font-size: 0.82rem; color: var(--slate); margin-bottom: 24px; }
.field { margin-bottom: 14px; }
.field label { display: block; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--slate); margin-bottom: 6px; }
.field input { width: 100%; padding: 10px 14px; background: var(--navy-lite); border: 1px solid var(--line); border-radius: var(--r); color: var(--ink); font-family: 'Syne', sans-serif; font-size: 0.88rem; outline: none; transition: border-color 0.15s; }
.field input:focus { border-color: var(--blue); }
.login-err { font-size: 0.8rem; color: var(--red); background: var(--red-dim); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; display: none; }
.btn-login { width: 100%; padding: 12px; background: var(--red); color: #fff; border: none; border-radius: var(--r); font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.btn-login:hover { background: #b91c1c; }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── APP ───────────────────────────────────────── */
#app { display: none; flex-direction: column; height: 100vh; overflow: hidden; }
#app.visible { display: flex; }

/* ── TOPBAR ────────────────────────────────────── */
.topbar {
  height: 56px; flex-shrink: 0; background: #fff;
  border-bottom: 1px solid var(--line);
  display: flex; align-items: center; padding: 0 28px; gap: 16px;
}
.topbar-logo { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; font-weight: 700; color: var(--ink); }
.topbar-logo-mark { width: 28px; height: 28px; background: var(--red); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
.topbar-logo-mark svg { width: 14px; height: 14px; }
.topbar-badge { padding: 2px 10px; border-radius: 20px; background: var(--red-dim); color: var(--red); font-size: 0.68rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
.topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.admin-name { font-size: 0.82rem; color: var(--slate); font-weight: 600; }
.btn-logout { padding: 5px 14px; border-radius: 8px; font-size: 0.78rem; font-weight: 600; color: var(--slate); background: transparent; border: 1px solid var(--line); cursor: pointer; font-family: 'Syne', sans-serif; transition: all 0.12s; }
.btn-logout:hover { color: var(--red); border-color: var(--red); }

/* ── CONTENT ───────────────────────────────────── */
.content { flex: 1; overflow-y: auto; padding: 28px; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

/* ── STATS CARDS ───────────────────────────────── */
.stats-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 28px;
}
.stat-card {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-lg); padding: 20px 22px;
  box-shadow: var(--shadow);
}
.stat-label { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: var(--slate); margin-bottom: 8px; }
.stat-value { font-size: 2rem; font-weight: 800; color: var(--ink); letter-spacing: -0.03em; line-height: 1; }
.stat-sub { font-size: 0.75rem; color: var(--slate); margin-top: 4px; }
.stat-card.blue  .stat-value { color: var(--blue); }
.stat-card.green .stat-value { color: var(--green); }
.stat-card.amber .stat-value { color: var(--amber); }
.stat-card.red   .stat-value { color: var(--red); }

/* ── SECTION ───────────────────────────────────── */
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.section-title { font-family: 'Spectral', serif; font-size: 1.2rem; font-weight: 600; color: var(--ink); }
.section-search {
  padding: 7px 14px; border: 1px solid var(--line); border-radius: var(--r);
  font-family: 'Syne', sans-serif; font-size: 0.82rem; color: var(--ink);
  background: #fff; outline: none; width: 220px; transition: border-color 0.15s;
}
.section-search:focus { border-color: var(--blue); }

/* ── TABLE ─────────────────────────────────────── */
.admin-table-wrap {
  background: #fff; border: 1px solid var(--line);
  border-radius: var(--r-lg); overflow: hidden;
  box-shadow: var(--shadow);
}
.admin-table { width: 100%; border-collapse: collapse; }
.admin-table th {
  text-align: left; font-size: 0.68rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--slate); padding: 10px 16px;
  border-bottom: 2px solid var(--line); background: var(--off);
}
.admin-table td {
  padding: 13px 16px; font-size: 0.84rem;
  border-bottom: 1px solid var(--line); vertical-align: middle;
}
.admin-table tr:last-child td { border-bottom: none; }
.admin-table tr:hover td { background: var(--blue-dim); }

.clinic-name { font-weight: 700; color: var(--ink); }
.clinic-city { font-size: 0.75rem; color: var(--slate); margin-top: 2px; }
.doctor-count { font-size: 0.82rem; color: var(--ink-soft); }

/* Plan badge */
.plan-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 700;
}
.plan-badge.free { background: var(--navy-lite); color: var(--slate); }
.plan-badge.paid { background: var(--green-dim); color: var(--green); }

/* Patient usage bar in table */
.pt-usage { display: flex; align-items: center; gap: 8px; }
.pt-usage-track { width: 80px; height: 5px; background: var(--line); border-radius: 3px; overflow: hidden; }
.pt-usage-fill { height: 100%; border-radius: 3px; background: var(--blue); }
.pt-usage-fill.warn { background: var(--amber); }
.pt-usage-fill.full { background: var(--red); }
.pt-usage-label { font-size: 0.75rem; color: var(--slate); white-space: nowrap; }

/* Action buttons */
.btn-plan-toggle {
  padding: 5px 12px; border-radius: 8px;
  font-family: 'Syne', sans-serif; font-size: 0.75rem; font-weight: 700;
  cursor: pointer; transition: all 0.12s; border: 1px solid;
}
.btn-plan-toggle.upgrade { background: var(--green-dim); color: var(--green); border-color: var(--green); }
.btn-plan-toggle.upgrade:hover { background: var(--green); color: #fff; }
.btn-plan-toggle.downgrade { background: var(--red-dim); color: var(--red); border-color: var(--red); }
.btn-plan-toggle.downgrade:hover { background: var(--red); color: #fff; }

/* Loading / empty */
.loading-row td { text-align: center; padding: 40px; color: var(--slate); font-size: 0.88rem; }

/* ── CLINIC DETAIL DRAWER ──────────────────────── */
.drawer-overlay {
  position: fixed; inset: 0; background: rgba(30,58,120,0.2);
  backdrop-filter: blur(4px); z-index: 100;
  display: none;
}
.drawer-overlay.open { display: block; }
.drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 420px; max-width: 96vw;
  background: #fff; border-left: 1px solid var(--line);
  box-shadow: -4px 0 32px rgba(37,99,235,0.10);
  display: flex; flex-direction: column;
  transform: translateX(100%); transition: transform 0.25s ease;
  z-index: 101;
}
.drawer.open { transform: translateX(0); }
.drawer-head {
  display: flex; align-items: center; gap: 12px;
  padding: 18px 22px; border-bottom: 1px solid var(--line);
  flex-shrink: 0;
}
.drawer-title { flex: 1; font-family: 'Spectral', serif; font-size: 1.1rem; font-weight: 600; color: var(--ink); }
.drawer-close {
  width: 28px; height: 28px; border-radius: 7px;
  background: var(--navy-lite); border: none; color: var(--slate);
  font-size: 0.9rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.drawer-close:hover { background: var(--red-dim); color: var(--red); }
.drawer-body { flex: 1; overflow-y: auto; padding: 20px 22px; display: flex; flex-direction: column; gap: 16px; }

.detail-section-title {
  font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--slate); margin-bottom: 8px;
}
.detail-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 0.84rem; }
.detail-row:last-child { border-bottom: none; }
.detail-key { color: var(--slate); font-weight: 600; }
.detail-val { color: var(--ink); font-weight: 700; }

.drawer-footer {
  padding: 16px 22px; border-top: 1px solid var(--line);
  display: flex; gap: 10px; flex-shrink: 0;
}
.btn-full {
  flex: 1; padding: 10px; border-radius: var(--r);
  font-family: 'Syne', sans-serif; font-size: 0.85rem; font-weight: 700;
  cursor: pointer; border: none; transition: all 0.12s;
}
.btn-full.green { background: var(--green); color: #fff; }
.btn-full.green:hover { background: #15803d; }
.btn-full.red { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
.btn-full.red:hover { background: var(--red); color: #fff; }
.btn-full.ghost { background: var(--off); color: var(--slate); border: 1px solid var(--line); }
.btn-full.ghost:hover { color: var(--ink); border-color: var(--ink); }

/* Doctor list in drawer */
.doctor-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--line); font-size: 0.82rem;
}
.doctor-row:last-child { border-bottom: none; }
.doctor-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--blue-dim); color: var(--blue);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 800; flex-shrink: 0;
}
.doctor-info { flex: 1; }
.doctor-name-row { font-weight: 700; color: var(--ink); }
.doctor-email-row { font-size: 0.72rem; color: var(--slate); }
.role-badge {
  padding: 2px 8px; border-radius: 12px; font-size: 0.68rem; font-weight: 700;
}
.role-badge.owner { background: var(--blue-dim); color: var(--blue); }
.role-badge.member { background: var(--off); color: var(--slate); }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">
        <svg viewBox="0 0 18 18" fill="none"><rect x="8" y="2" width="2" height="14" rx="1" fill="#ffffff"/><rect x="2" y="8" width="14" height="2" rx="1" fill="#ffffff"/></svg>
      </div>
      <div class="login-logo-text">Privatni<span>Lekar</span> <span class="login-badge">Admin</span></div>
    </div>
    <div class="login-title">Admin panel</div>
    <div class="login-sub">Prijava je dozvoljena samo super-adminima.</div>
    <div class="field"><label>Email</label><input id="lgEmail" type="email" placeholder="admin@email.com" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="field"><label>Lozinka</label><input id="lgPass" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-err" id="lgErr"></div>
    <button class="btn-login" id="lgBtn" onclick="doLogin()">Prijavi se →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="topbar-logo-mark">
        <svg viewBox="0 0 14 14" fill="none"><rect x="6" y="1" width="2" height="12" rx="1" fill="#ffffff"/><rect x="1" y="6" width="12" height="2" rx="1" fill="#ffffff"/></svg>
      </div>
      PrivatniLekar
      <span class="topbar-badge">Admin</span>
    </div>
    <div class="topbar-right">
      <span class="admin-name" id="adminName"></span>
      <button class="btn-logout" onclick="doLogout()">Odjava</button>
    </div>
  </div>

  <div class="content">
    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card blue">
        <div class="stat-label">Ukupno klinika</div>
        <div class="stat-value" id="statClinics">—</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Plaćeni planovi</div>
        <div class="stat-value" id="statPaid">—</div>
        <div class="stat-sub" id="statPaidPct"></div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Free planovi</div>
        <div class="stat-value" id="statFree">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ukupno lekara</div>
        <div class="stat-value" id="statDoctors">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ukupno pacijenata</div>
        <div class="stat-value" id="statPatients">—</div>
      </div>
    </div>

    <!-- Clinics table -->
    <div class="section-head">
      <div class="section-title">Klinike</div>
      <input class="section-search" type="text" placeholder="Pretraži kliniku…" oninput="filterClinics(this.value)" id="clinicSearch">
    </div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Klinika</th>
            <th>Vlasnik</th>
            <th>Plan</th>
            <th>Pacijenti</th>
            <th>Lekari</th>
            <th>Registrovana</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="clinicsTableBody">
          <tr class="loading-row"><td colspan="7">Učitavamo…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- CLINIC DETAIL DRAWER -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-title" id="drawerTitle">Klinika</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<script>
const SUPA_URL = 'https://vuwjngaeimzeraytfqyp.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1d2puZ2FlaW16ZXJheXRmcXlwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDIxMjcsImV4cCI6MjA4ODQ3ODEyN30.G1iw4_Expb2ey11LTbpQoSj6OecC2NLN5saPFGHfMaM';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);

const fmtDate = d => { const dt = new Date(d+'T12:00:00'); return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear(); };
const fmtDateTime = d => { const dt = new Date(d); return fmtDate(dt.toISOString().split('T')[0]) + ' ' + dt.toLocaleTimeString('sr-RS',{hour:'2-digit',minute:'2-digit'}); };

let adminDoctor = null;
let allClinics  = [];   // enriched with counts
let drawerClinic = null;

// ── AUTH ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session?.user) await tryInitAdmin(session.user);
});

async function doLogin() {
  const email = document.getElementById('lgEmail').value.trim();
  const pass  = document.getElementById('lgPass').value;
  if (!email || !pass) return showLoginErr('Unesite email i lozinku.');
  const btn = document.getElementById('lgBtn');
  btn.disabled = true; btn.textContent = 'Prijavljujem…';
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Prijavi se →';
  if (error) return showLoginErr('Pogrešan email ili lozinka.');
  await tryInitAdmin(data.user);
}

async function tryInitAdmin(user) {
  const { data: doc } = await sb.from('doctors').select('*').eq('id', user.id).maybeSingle();
  if (!doc || !doc.is_super_admin) {
    await sb.auth.signOut();
    return showLoginErr('Nemate admin pristup.');
  }
  adminDoctor = doc;
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('adminName').textContent = doc.full_name;
  await loadDashboard();
}

function showLoginErr(msg) {
  const el = document.getElementById('lgErr');
  el.textContent = msg; el.style.display = 'block';
}

async function doLogout() {
  await sb.auth.signOut();
  location.reload();
}

// ── DASHBOARD ─────────────────────────────────────
async function loadDashboard() {
  // Load all clinics
  const { data: clinics } = await sb.from('clinics').select('*').order('created_at', { ascending: false });

  // Load all doctors grouped by clinic
  const { data: doctors } = await sb.from('doctors').select('id,full_name,email,clinic_id,role,created_at');

  // Load patient counts per clinic
  const { data: patients } = await sb.from('patients').select('id,clinic_id');

  // Enrich clinics with counts
  allClinics = (clinics || []).map(cl => {
    const clDoctors  = (doctors || []).filter(d => d.clinic_id === cl.id);
    const clPatients = (patients || []).filter(p => p.clinic_id === cl.id);
    const owner      = clDoctors.find(d => d.role === 'owner') || clDoctors[0];
    return { ...cl, _doctors: clDoctors, _patients: clPatients, _owner: owner };
  });

  renderStats(allClinics);
  renderClinicsTable(allClinics);
}

function renderStats(clinics) {
  const total    = clinics.length;
  const paid     = clinics.filter(c => c.plan === 'paid').length;
  const free     = total - paid;
  const doctors  = clinics.reduce((s, c) => s + c._doctors.length, 0);
  const patients = clinics.reduce((s, c) => s + c._patients.length, 0);
  const paidPct  = total ? Math.round(paid / total * 100) : 0;

  document.getElementById('statClinics').textContent  = total;
  document.getElementById('statPaid').textContent     = paid;
  document.getElementById('statPaidPct').textContent  = total ? `${paidPct}% ukupnih` : '';
  document.getElementById('statFree').textContent     = free;
  document.getElementById('statDoctors').textContent  = doctors;
  document.getElementById('statPatients').textContent = patients;
}

function renderClinicsTable(clinics) {
  const tbody = document.getElementById('clinicsTableBody');
  if (!clinics.length) {
    tbody.innerHTML = '<tr class="loading-row"><td colspan="7">Nema registrovanih klinika.</td></tr>';
    return;
  }
  tbody.innerHTML = clinics.map(cl => {
    const ptCount  = cl._patients.length;
    const limit    = cl.plan === 'paid' ? null : (cl.patient_limit || 25);
    const pct      = limit ? Math.min(100, Math.round(ptCount / limit * 100)) : 0;
    const fillClass = pct >= 100 ? 'full' : pct >= 80 ? 'warn' : '';

    const usageHtml = limit
      ? `<div class="pt-usage">
          <div class="pt-usage-track"><div class="pt-usage-fill ${fillClass}" style="width:${pct}%"></div></div>
          <span class="pt-usage-label">${ptCount} / ${limit}</span>
        </div>`
      : `<span style="font-size:0.82rem;color:var(--green);font-weight:700">∞ ${ptCount}</span>`;

    const planBadge = cl.plan === 'paid'
      ? `<span class="plan-badge paid">✓ Paid</span>`
      : `<span class="plan-badge free">Free</span>`;

    const toggleBtn = cl.plan === 'paid'
      ? `<button class="btn-plan-toggle downgrade" onclick="event.stopPropagation();togglePlan('${cl.id}','free')">↓ Free</button>`
      : `<button class="btn-plan-toggle upgrade" onclick="event.stopPropagation();togglePlan('${cl.id}','paid')">↑ Paid</button>`;

    return `<tr onclick="openDrawer('${cl.id}')" style="cursor:pointer">
      <td>
        <div class="clinic-name">${cl.name}</div>
        ${cl.city ? `<div class="clinic-city">📍 ${cl.city}</div>` : ''}
      </td>
      <td>
        ${cl._owner
          ? `<div style="font-size:0.82rem;font-weight:600;color:var(--ink)">${cl._owner.full_name}</div>
             <div style="font-size:0.72rem;color:var(--slate)">${cl._owner.email}</div>`
          : '<span style="color:var(--slate);font-size:0.78rem">—</span>'}
      </td>
      <td>${planBadge}</td>
      <td>${usageHtml}</td>
      <td><span class="doctor-count">${cl._doctors.length}</span></td>
      <td style="font-size:0.78rem;color:var(--slate)">${cl.created_at ? fmtDate(cl.created_at.split('T')[0]) : '—'}</td>
      <td>${toggleBtn}</td>
    </tr>`;
  }).join('');
}

function filterClinics(q) {
  const query = q.toLowerCase().trim();
  const filtered = allClinics.filter(cl =>
    cl.name.toLowerCase().includes(query) ||
    cl.city?.toLowerCase().includes(query) ||
    cl._owner?.full_name.toLowerCase().includes(query) ||
    cl._owner?.email.toLowerCase().includes(query)
  );
  renderClinicsTable(filtered);
}

// ── PLAN TOGGLE ────────────────────────────────────
async function togglePlan(clinicId, newPlan) {
  const { error } = await sb.from('clinics')
    .update({ plan: newPlan })
    .eq('id', clinicId);
  if (error) { alert('Greška: ' + error.message); return; }
  // Update local
  const cl = allClinics.find(c => c.id === clinicId);
  if (cl) cl.plan = newPlan;
  renderStats(allClinics);
  renderClinicsTable(allClinics);
  // Update drawer if open
  if (drawerClinic?.id === clinicId) {
    drawerClinic.plan = newPlan;
    renderDrawerContent(drawerClinic);
  }
}

// ── DRAWER ─────────────────────────────────────────
function openDrawer(clinicId) {
  drawerClinic = allClinics.find(c => c.id === clinicId);
  if (!drawerClinic) return;
  document.getElementById('drawerTitle').textContent = drawerClinic.name;
  renderDrawerContent(drawerClinic);
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  drawerClinic = null;
}

function renderDrawerContent(cl) {
  const ptCount = cl._patients.length;
  const limit   = cl.plan === 'paid' ? '∞' : (cl.patient_limit || 25);
  const pct     = cl.plan === 'paid' ? 0 : Math.min(100, Math.round(ptCount / (cl.patient_limit || 25) * 100));
  const fillClass = pct >= 100 ? 'full' : pct >= 80 ? 'warn' : '';

  document.getElementById('drawerBody').innerHTML = `
    <!-- Clinic info -->
    <div>
      <div class="detail-section-title">Informacije o klinici</div>
      <div class="detail-row"><span class="detail-key">Naziv</span><span class="detail-val">${cl.name}</span></div>
      ${cl.city    ? `<div class="detail-row"><span class="detail-key">Grad</span><span class="detail-val">${cl.city}</span></div>` : ''}
      ${cl.address ? `<div class="detail-row"><span class="detail-key">Adresa</span><span class="detail-val">${cl.address}</span></div>` : ''}
      ${cl.phone   ? `<div class="detail-row"><span class="detail-key">Telefon</span><span class="detail-val">${cl.phone}</span></div>` : ''}
      ${cl.email   ? `<div class="detail-row"><span class="detail-key">Email</span><span class="detail-val">${cl.email}</span></div>` : ''}
      ${cl.pib     ? `<div class="detail-row"><span class="detail-key">PIB</span><span class="detail-val">${cl.pib}</span></div>` : ''}
      <div class="detail-row"><span class="detail-key">Registrovana</span><span class="detail-val">${cl.created_at ? fmtDateTime(cl.created_at) : '—'}</span></div>
    </div>

    <!-- Plan -->
    <div>
      <div class="detail-section-title">Plan</div>
      <div class="detail-row">
        <span class="detail-key">Trenutni plan</span>
        <span class="plan-badge ${cl.plan}">${cl.plan === 'paid' ? '✓ Paid' : 'Free'}</span>
      </div>
      <div class="detail-row">
        <span class="detail-key">Pacijenti</span>
        <span class="detail-val">${ptCount} / ${limit}</span>
      </div>
      ${cl.plan === 'free' ? `
      <div style="margin-top:8px">
        <div class="pt-usage-track" style="width:100%;max-width:100%;height:6px">
          <div class="pt-usage-fill ${fillClass}" style="width:${pct}%"></div>
        </div>
        <div style="font-size:0.72rem;color:var(--slate);margin-top:4px">${pct}% iskorišćeno</div>
      </div>` : ''}
      ${cl.plan_expires_at ? `<div class="detail-row"><span class="detail-key">Ističe</span><span class="detail-val">${fmtDateTime(cl.plan_expires_at)}</span></div>` : ''}
    </div>

    <!-- Doctors -->
    <div>
      <div class="detail-section-title">Lekari (${cl._doctors.length})</div>
      ${cl._doctors.length ? cl._doctors.map(d => `
        <div class="doctor-row">
          <div class="doctor-avatar">${d.full_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}</div>
          <div class="doctor-info">
            <div class="doctor-name-row">${d.full_name}</div>
            <div class="doctor-email-row">${d.email}</div>
          </div>
          <span class="role-badge ${d.role || 'member'}">${d.role === 'owner' ? 'Vlasnik' : 'Član'}</span>
        </div>`).join('')
      : '<div style="font-size:0.82rem;color:var(--slate);padding:8px 0">Nema registrovanih lekara.</div>'}
    </div>
  `;

  // Footer actions
  document.getElementById('drawerFooter').innerHTML = cl.plan === 'paid'
    ? `<button class="btn-full red" onclick="togglePlan('${cl.id}','free')">↓ Prebaci na Free</button>
       <button class="btn-full ghost" onclick="closeDrawer()">Zatvori</button>`
    : `<button class="btn-full green" onclick="togglePlan('${cl.id}','paid')">↑ Aktiviraj Paid</button>
       <button class="btn-full ghost" onclick="closeDrawer()">Zatvori</button>`;
}
</script>
</body>
</html>
